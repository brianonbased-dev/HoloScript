[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/Dockerfile.moltbook-daemon"

[deploy]
startCommand = "node packages/core/dist/cli/holoscript-runner.js moltbook-daemon compositions/moltbook-agent.hsplus --always-on --provider anthropic --debug"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "moltbook-daemon"
