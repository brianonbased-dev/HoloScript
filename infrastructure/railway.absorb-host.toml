[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/Dockerfile.absorb-service"
watchPatterns = ["services/absorb-service/**", "packages/core/**", "packages/absorb-service/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
internalPort = 3005

[service]
name = "absorb-service"
