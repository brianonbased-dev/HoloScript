# Railway config for the bitnet.cpp inference server
#
# Deploy this as a separate Railway service alongside the MCP server.
# Once running, set HOLOSCRIPT_BITNET_URL=https://<this-service-domain>
# in the holoscript-mcp service environment variables.
#
# The MCP server will then route generate_scene/generate_object requests
# to the real BitNet 1-bit model instead of falling back to heuristics.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.bitnet-server"

[deploy]
startCommand = "python run_inference.py --serve --port $PORT --host 0.0.0.0 --model-dir /data/models/$MODEL_ID"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables (set via Railway dashboard or railway.json)
# MODEL_ID    = microsoft/bitnet-b1.58-2B-4T
# MODEL_QUANT = i2_s
# PORT        = injected by Railway automatically

[[services]]
name = "holoscript-bitnet"

[[volumes]]
mountPath = "/data"
