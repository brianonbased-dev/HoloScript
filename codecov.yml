# Codecov Configuration for HoloScript
# Enforces 80%+ coverage threshold for production readiness

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: '70...100'

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
        informational: false

comment:
  layout: 'header, diff, files, footer'
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# Ignore generated files and test fixtures
ignore:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/dist/**'
  - '**/node_modules/**'
  - '**/coverage/**'
  - '**/__tests__/**'
  - '**/__mocks__/**'
  - '**/examples/**'
  - '**/datasets/**'

# Flags for different package coverage tracking
flags:
  core:
    paths:
      - packages/core/src
  cli:
    paths:
      - packages/cli/src
  formatter:
    paths:
      - packages/formatter/src
  linter:
    paths:
      - packages/linter/src
  lsp:
    paths:
      - packages/lsp/src
  vscode:
    paths:
      - packages/vscode-extension/src
  adapters:
    paths:
      - packages/adapter-*/src
  sdk:
    paths:
      - packages/partner-sdk/src
      - packages/marketplace-api/src
