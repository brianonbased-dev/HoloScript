<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paper-6 GPU Benchmark — Cross-Backend Matrix + Latency</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; overflow-x: auto; }
    .pass { color: #4ade80; } .fail { color: #f87171; } .info { color: #60a5fa; }
    h2 { color: #818cf8; }
    .toolbar { display: flex; gap: 12px; align-items: center; margin: 12px 0 20px; flex-wrap: wrap; }
    .button {
      display: inline-block; padding: 8px 12px; border-radius: 6px;
      background: #2b3b66; color: #e0e0e0; text-decoration: none;
      border: 1px solid #4b5b86; cursor: pointer;
    }
    .hint { color: #a5b4fc; }
  </style>
</head>
<body>
<h1>Paper-6 WebGPU Cross-Backend Matrix Benchmark</h1>
<p class="hint">
  Use <code>?target=rtx3060&amp;strictAdapter=1&amp;commit=&lt;sha&gt;&amp;driver=&lt;version&gt;</code>
  for the canonical RTX 3060 rerun.
</p>
<div class="toolbar">
  <a id="downloadJson" class="button" href="#">Download JSON artifact</a>
  <span id="artifactStatus" class="hint">Artifact status: initializing</span>
</div>
<pre id="log">Initializing...</pre>
<h2>Artifact JSON</h2>
<pre id="artifact">{}</pre>

<!-- The bundled entry point is produced by:
     pnpm run build:paper6-bench
     (esbuild bundles src/animation/paper/benchmarks/paper-6-webgpu-matrix.entry.ts)
-->
<script src="benchmark-paper6-webgpu.js"></script>
<script>
(function () {
  const log = document.getElementById('log');
  const artifactPre = document.getElementById('artifact');
  const downloadJson = document.getElementById('downloadJson');
  const artifactStatus = document.getElementById('artifactStatus');

  function print(msg, cls) {
    const span = document.createElement('span');
    span.className = cls || '';
    span.textContent = msg + '\n';
    log.appendChild(span);
    log.scrollTop = log.scrollHeight;
  }

  function refreshArtifactView() {
    const a = window.__PAPER6_WEBGPU_ARTIFACT__;
    if (!a) return;
    const json = JSON.stringify(a, null, 2);
    artifactPre.textContent = json;
    downloadJson.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
    downloadJson.download = 'paper-6-gpu-bench.json';
    artifactStatus.textContent = 'Artifact status: ' + a.status;
  }

  // Poll for artifact readiness (the bundled script sets it asynchronously)
  const poll = setInterval(() => {
    const a = window.__PAPER6_WEBGPU_ARTIFACT__;
    if (!a) return;
    if (a.status === 'completed' || a.status === 'error' || a.status === 'aborted_wrong_adapter') {
      clearInterval(poll);
      if (a.status === 'completed') {
        print('Benchmark completed.', 'pass');
        print('Hash: 0x' + a.cell.hash.toString(16).padStart(8, '0'));
        print('Equal to baseline: ' + a.cell.hashEqual);
        print('Sampling time: ' + a.cell.timings.sampling_ms.toFixed(3) + ' ms');
      } else if (a.status === 'aborted_wrong_adapter') {
        print('Aborted: wrong adapter.', 'fail');
      } else {
        print('Benchmark error.', 'fail');
        a.failures.forEach(f => print('[' + f.stage + '] ' + f.message, 'fail'));
      }
      a.notes.forEach(n => print('Note: ' + n, 'info'));
      refreshArtifactView();
    }
  }, 250);
})();
</script>
</body>
</html>
