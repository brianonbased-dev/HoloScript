[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm --filter @holoscript/marketplace-api build"
watchPatterns = ["packages/marketplace-api/**", "packages/registry/**", "packages/core/**"]

[deploy]
startCommand = "pnpm --filter @holoscript/marketplace-api start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_VERSION = "20"
CORS_ORIGINS = "https://marketplace-web-production.up.railway.app"
TRUST_PROXY = "true"
