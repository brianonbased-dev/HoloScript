<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brittney Benchmark Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #0f172a; color: #e2e8f0; }
    h1 { color: #38bdf8; }
    h2 { color: #94a3b8; margin-top: 2rem; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .card { background: #1e293b; padding: 1rem; border-radius: 8px; border: 1px solid #334155; }
    .card h3 { margin: 0 0 0.5rem; font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; }
    .card .value { font-size: 2rem; font-weight: bold; color: #38bdf8; }
    .card .delta { font-size: 0.875rem; color: #4ade80; }
    .card .delta.negative { color: #f87171; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.875rem; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #94a3b8; font-weight: 500; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .partial { color: #fbbf24; }
    .config-tag { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
    .config-brittney { background: #0c4a6e; color: #7dd3fc; }
    .config-cursor { background: #3f6212; color: #bef264; }
    .config-claude { background: #581c87; color: #e9d5ff; }
    .config-vanilla { background: #7c2d12; color: #fed7aa; }
    .run-selector { margin: 1rem 0; }
    .run-selector select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Brittney Benchmark Dashboard</h1>
  <p>Load a <code>results.json</code> file to visualize benchmark outcomes.</p>

  <input type="file" id="fileInput" accept=".json" />

  <div id="dashboard" style="display:none;">
    <div class="summary" id="summary"></div>

    <h2>Per-Task Results</h2>
    <div id="taskTable"></div>

    <h2>Failure Analysis</h2>
    <div id="failureAnalysis"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dashboard = document.getElementById('dashboard');
    const summary = document.getElementById('summary');
    const taskTable = document.getElementById('taskTable');
    const failureAnalysis = document.getElementById('failureAnalysis');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      const run = JSON.parse(text);
      render(run);
    });

    function render(run) {
      dashboard.style.display = 'block';

      // Summary cards
      const total = run.outcomes.length;
      const passed = run.outcomes.filter(o => o.creation_completion).length;
      const failed = total - passed;
      const passRate = ((passed / total) * 100).toFixed(1);
      const budgetUsed = run.budget_usd_used.toFixed(2);
      const budgetMax = run.budget_usd_max.toFixed(2);
      const duration = ((new Date(run.finished_at) - new Date(run.started_at)) / 60000).toFixed(1);

      summary.innerHTML = `
        <div class="card">
          <h3>Pass Rate</h3>
          <div class="value">${passRate}%</div>
          <div class="delta">${passed}/${total} cells</div>
        </div>
        <div class="card">
          <h3>Budget</h3>
          <div class="value">$${budgetUsed}</div>
          <div class="delta" class="${run.budget_usd_used > run.budget_usd_max ? 'negative' : ''}">/ $${budgetMax}</div>
        </div>
        <div class="card">
          <h3>Duration</h3>
          <div class="value">${duration}m</div>
          <div class="delta">${run.outcomes.length} cells</div>
        </div>
        <div class="card">
          <h3>Configs</h3>
          <div class="value">${run.configs.length}</div>
          <div class="delta">${run.configs.join(', ')}</div>
        </div>
      `;

      // Per-task table
      const tasks = [...new Set(run.outcomes.map(o => o.task_id))].sort();
      const configs = [...new Set(run.outcomes.map(o => o.config))];

      const tiers = ['trivial-scene', 'multi-object-scene', 'agentic-multi-step'];
      const tierOf = (tid) => {
        const o = run.outcomes.find(x => x.task_id === tid);
        return o ? o.tier : 'unknown';
      };

      let tableHTML = '<table><tr><th>Task</th><th>Tier</th>';
      for (const c of configs) tableHTML += `<th>${c}</th>`;
      tableHTML += '</tr>';

      for (const tier of tiers) {
        const tierTasks = tasks.filter(t => tierOf(t) === tier);
        if (tierTasks.length === 0) continue;

        for (const tid of tierTasks) {
          tableHTML += `<tr><td>${tid}</td><td>${tier}</td>`;
          for (const c of configs) {
            const cells = run.outcomes.filter(o => o.task_id === tid && o.config === c);
            if (cells.length === 0) {
              tableHTML += '<td>-</td>';
            } else {
              const completed = cells.filter(o => o.creation_completion).length;
              const total = cells.length;
              const status = completed === total ? 'pass' : completed === 0 ? 'fail' : 'partial';
              const objCount = cells[0]?.create_object_count !== undefined ? ` (${cells[0].create_object_count})` : '';
              tableHTML += `<td class="${status}">${completed}/${total}${objCount}</td>`;
            }
          }
          tableHTML += '</tr>';
        }
      }
      tableHTML += '</table>';
      taskTable.innerHTML = tableHTML;

      // Failure analysis
      const failures = run.outcomes.filter(o => !o.creation_completion && !o.error);
      if (failures.length === 0) {
        failureAnalysis.innerHTML = '<p>No failures to analyze!</p>';
      } else {
        const byTask = {};
        for (const f of failures) {
          if (!byTask[f.task_id]) byTask[f.task_id] = [];
          byTask[f.task_id].push(f);
        }

        let failHTML = '<table><tr><th>Task</th><th>Config</th><th>Trial</th><th>Failed Criteria</th><th>Objects</th></tr>';
        for (const [tid, fs] of Object.entries(byTask)) {
          for (const f of fs) {
            const failedCriteria = f.per_criterion.filter(c => !c.passed).map(c => c.criterion_id).join(', ');
            failHTML += `<tr><td>${tid}</td><td>${f.config}</td><td>${f.trial}</td><td>${failedCriteria}</td><td>${f.create_object_count ?? '?'}</td></tr>`;
          }
        }
        failHTML += '</table>';
        failureAnalysis.innerHTML = failHTML;
      }
    }
  </script>
</body>
</html>
