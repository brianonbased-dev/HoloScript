[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/Dockerfile.mcp-server"
watchPatterns = ["packages/mcp-server/**", "packages/core/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "3000"
