name: HoloScript CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - '**.holo'
      - '**.hs'
      - '**.hsplus'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.holo'
      - '**.hs'
      - '**.hsplus'

jobs:
  validate:
    name: Validate HoloScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HoloScript CLI
        run: npm install -g @holoscript/cli

      - name: Find HoloScript files
        id: find-files
        run: |
          FILES=$(find . -type f \( -name "*.holo" -o -name "*.hs" -o -name "*.hsplus" \) -printf '%p,' | sed 's/,$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Found files: $FILES"

      - name: Validate HoloScript syntax
        run: |
          IFS=',' read -ra FILE_ARRAY <<< "${{ steps.find-files.outputs.files }}"
          for file in "${FILE_ARRAY[@]}"; do
            echo "Validating $file..."
            hs validate "$file" || exit 1
          done

      - name: Run HoloScript tests
        run: |
          IFS=',' read -ra FILE_ARRAY <<< "${{ steps.find-files.outputs.files }}"
          for file in "${FILE_ARRAY[@]}"; do
            if grep -q "@test" "$file"; then
              echo "Running tests in $file..."
              hs run "$file" || exit 1
            fi
          done

  compile-preview:
    name: Compile & Generate Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HoloScript CLI
        run: npm install -g @holoscript/cli

      - name: Find changed HoloScript files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **.holo
            **.hs
            **.hsplus

      - name: Compile to Three.js
        id: compile
        run: |
          mkdir -p previews
          PREVIEW_URLS=""

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Compiling $file..."
            BASENAME=$(basename "$file" | sed 's/\.[^.]*$//')
            OUTPUT="previews/${BASENAME}.html"

            # Compile to Three.js with embedded HTML
            hs compile "$file" --target threejs -o "$OUTPUT" || continue

            # Upload to HoloScript preview service
            PREVIEW_URL=$(curl -s -X POST https://mcp.holoscript.net/api/render \
              -H "Content-Type: application/json" \
              -d "{\"code\":\"$(cat $file | jq -Rs .)\",\"target\":\"threejs\",\"format\":\"html\"}" \
              | jq -r '.previewUrl // empty')

            if [ -n "$PREVIEW_URL" ]; then
              PREVIEW_URLS="${PREVIEW_URLS}\n- [$file]($PREVIEW_URL)"
            fi
          done

          echo "preview_urls<<EOF" >> $GITHUB_OUTPUT
          echo -e "$PREVIEW_URLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post preview comment on PR
        if: steps.compile.outputs.preview_urls != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrls = `${{ steps.compile.outputs.preview_urls }}`;
            const body = `## 🎨 HoloScript Preview Links

            ${previewUrls}

            ---
            *Generated by [HoloScript CI/CD](https://github.com/holoscript/holoscript)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  quality-check:
    name: Quality & Trait Analysis
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HoloScript CLI
        run: npm install -g @holoscript/cli

      - name: Run quality checks
        run: |
          FILES=$(find . -type f \( -name "*.holo" -o -name "*.hs" -o -name "*.hsplus" \))

          for file in $FILES; do
            echo "Analyzing $file..."
            hs analyze "$file" || true
          done

      - name: Generate trait suggestions
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(find . -type f -name "*.holo")
          SUGGESTIONS=""

          for file in $FILES; do
            echo "Suggesting traits for $file..."
            RESULT=$(hs ai-suggest "$file" 2>&1 || echo "")
            if [ -n "$RESULT" ]; then
              SUGGESTIONS="${SUGGESTIONS}\n### $file\n${RESULT}\n"
            fi
          done

          if [ -n "$SUGGESTIONS" ]; then
            echo "$SUGGESTIONS" > trait-suggestions.md
          fi

      - name: Upload trait suggestions
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: trait-suggestions
          path: trait-suggestions.md
          if-no-files-found: ignore

  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    needs: [validate, compile-preview]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    environment:
      name: preview-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HoloScript CLI
        run: npm install -g @holoscript/cli

      - name: Package for deployment
        run: |
          # Compile all .holo files to a single package
          mkdir -p dist
          find . -type f -name "*.holo" -exec hs compile {} --target r3f -o dist/ \;

      - name: Deploy to preview environment
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Use Railway CLI or custom deployment script
          # This is a placeholder - customize based on your deployment target
          echo "preview_url=https://preview-${{ github.event.number }}.holoscript.app" >> $GITHUB_OUTPUT

  agentic-validation:
    name: AI-Powered Scene Validation
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g @holoscript/cli @modelcontextprotocol/sdk

      - name: Run agentic validation
        id: agentic-validation
        env:
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Find changed .holo files
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(holo|hs|hsplus)$' || echo "")

          if [ -z "$FILES" ]; then
            echo "No HoloScript files changed"
            exit 0
          fi

          VALIDATION_REPORT=""

          for file in $FILES; do
            echo "Running agentic validation on $file..."

            # Call HoloScript MCP validation with AI analysis
            RESULT=$(curl -s -X POST https://mcp-orchestrator-production-45f9.up.railway.app/tools/call \
              -H "Content-Type: application/json" \
              -H "x-mcp-api-key: $MCP_API_KEY" \
              -d "{
                \"server\": \"holoscript-remote\",
                \"tool\": \"validate_holoscript\",
                \"args\": {\"code\": \"$(cat $file | jq -Rs .)\"}
              }" | jq -r '.')

            VALIDATION_REPORT="${VALIDATION_REPORT}\n### $file\n\`\`\`json\n${RESULT}\n\`\`\`\n"
          done

          echo "validation_report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$VALIDATION_REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post agentic validation report
        if: steps.agentic-validation.outputs.validation_report != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const report = `${{ steps.agentic-validation.outputs.validation_report }}`;
            const body = `## 🤖 AI-Powered Scene Validation

            ${report}

            ---
            *Powered by [HoloScript MCP](https://mcp.holoscript.net) & [Claude](https://claude.ai)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
