[package]
name = "shader-preview-wgpu"
version = "0.1.0"
edition = "2021"
description = "Offscreen wgpu render-to-texture pipeline for HoloScript shader preview"
license = "MIT"

[lib]
name = "shader_preview_wgpu"
path = "src/lib.rs"

[dependencies]
wgpu = "24"
pollster = "0.4"
bytemuck = { version = "1.19", features = ["derive"] }
log = "0.4"
thiserror = "2"
base64 = "0.22"
png = "0.17"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tokio = { version = "1", features = ["rt", "macros"] }
env_logger = "0.11"

[[bench]]
name = "render_benchmark"
harness = false
