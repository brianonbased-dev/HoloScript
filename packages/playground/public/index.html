<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HoloScript Playground</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:       #0d1117;
      --bg-panel:      #161b22;
      --bg-toolbar:    #1c2129;
      --border:        #30363d;
      --text-primary:  #e6edf3;
      --text-muted:    #8b949e;
      --accent:        #58a6ff;
      --accent-hover:  #79c0ff;
      --green:         #3fb950;
      --red:           #f85149;
      --toolbar-h:     44px;
    }

    html, body {
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== Toolbar ===== */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: var(--toolbar-h);
      padding: 0 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #toolbar .logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: -0.3px;
      margin-right: 8px;
    }

    #toolbar select {
      background: var(--bg-panel);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    #toolbar select:hover { border-color: var(--accent); }

    #toolbar .spacer { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); background: #1f2937; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* ===== Split Pane ===== */
    #split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      display: flex;
      flex-direction: column;
      width: 50%;
      min-width: 240px;
      border-right: 1px solid var(--border);
    }

    #preview-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 240px;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
    }

    #preview-container {
      flex: 1;
      position: relative;
      background: #0a0a14;
    }

    #preview-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
      font-size: 13px;
    }

    #preview-placeholder .icon {
      font-size: 40px;
      opacity: 0.3;
    }

    /* ===== Resizer ===== */
    #resizer {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #resizer:hover, #resizer.dragging { background: var(--accent); }

    /* ===== Toast ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-primary);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Status Bar ===== */
    #statusbar {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #statusbar .status-ok  { color: var(--green); }
    #statusbar .status-err { color: var(--red); }

    /* ===== Mobile Layout ===== */
    @media (max-width: 640px) {
      #split { flex-direction: column; }
      #editor-pane { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: 45vh; }
      #preview-pane { height: 55vh; }
      #resizer { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Toolbar -->
    <div id="toolbar">
      <span class="logo">&#x27B3; HoloScript</span>

      <select id="example-select" title="Load example scene">
        <option value="">Examples…</option>
        <option value="Hello Orb">Hello Orb</option>
        <option value="Physics Sandbox">Physics Sandbox</option>
        <option value="Multiplayer">Multiplayer Scene</option>
        <option value="Gallery">Gallery</option>
        <option value="Accessible UI">Accessible UI</option>
      </select>

      <div class="spacer"></div>

      <button class="btn" id="btn-share" title="Share via URL">
        &#128279; Share
      </button>
      <a class="btn" href="https://holoscript.dev/docs" target="_blank" rel="noopener" title="Documentation">
        &#128196; Docs
      </a>
    </div>

    <!-- Split Pane -->
    <div id="split">

      <!-- Editor -->
      <div id="editor-pane">
        <div class="pane-header">
          <span>editor.hsplus</span>
          <span id="orb-count">0 orbs</span>
        </div>
        <div id="editor-container"></div>
      </div>

      <!-- Resizer -->
      <div id="resizer"></div>

      <!-- Preview -->
      <div id="preview-pane">
        <div class="pane-header">
          <span>3D Preview</span>
          <span id="fps-display"></span>
        </div>
        <div id="preview-container">
          <div id="preview-placeholder">
            <span class="icon">&#9651;</span>
            <span>Loading Three.js preview…</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Status Bar -->
    <div id="statusbar">
      <span id="status-text" class="status-ok">Ready</span>
      <span>&#x2022;</span>
      <span id="parse-time">—</span>
      <span class="spacer" style="flex:1"></span>
      <span>HoloScript Playground v3.11.0</span>
    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Monaco CDN loader -->
  <script>
    // ---------------------------------------------------------------------------
    // Inline playground bootstrap (no bundler required)
    // ---------------------------------------------------------------------------
    (function () {
      // Lazy-load Monaco from CDN
      const MONACO_CDN = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs';

      window.require = { paths: { vs: MONACO_CDN } };

      function loadScript(src, cb) {
        const s = document.createElement('script');
        s.src = src;
        s.onload = cb;
        document.head.appendChild(s);
      }

      loadScript(MONACO_CDN + '/loader.js', function () {
        window.require(['vs/editor/editor.main'], function (monaco) {
          initPlayground(monaco);
        });
      });

      // ---------------------------------------------------------------------------
      // Minimal HoloScript language registration (inline, no import needed)
      // ---------------------------------------------------------------------------
      function registerHoloScript(monaco) {
        if (monaco.languages.getLanguages().some(function (l) { return l.id === 'holoscript'; })) return;

        monaco.languages.register({ id: 'holoscript', extensions: ['.hsplus', '.holo'] });

        monaco.languages.setMonarchTokensProvider('holoscript', {
          keywords: ['orb', 'template', 'environment', 'logic', 'on_click', 'on_tick', 'on_hover',
                     'true', 'false', 'null', 'if', 'else', 'return', 'let', 'const'],
          directives: ['physics', 'grabbable', 'synced', 'networked', 'accessible',
                       'haptic', 'highlight', 'shadow', 'alt_text', 'manifest'],
          tokenizer: {
            root: [
              [/@[a-z_]+/, { cases: { '@directives': 'keyword.directive', '@default': 'keyword.directive' } }],
              [/\/\/.*$/, 'comment'],
              [/\/\*/, 'comment', '@comment'],
              [/"([^"\\]|\\.)*"/, 'string'],
              [/\.\.\.[A-Z][A-Za-z0-9]*/, 'type'],
              [/[a-z_]\w*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
              [/[0-9]+(\.[0-9]+)?/, 'number'],
              [/[{}[\]()]/, 'delimiter'],
              [/[+\-*/?!:=<>|&]/, 'operator'],
            ],
            comment: [
              [/[^/*]+/, 'comment'],
              [/\*\//, 'comment', '@pop'],
              [/[/*]/, 'comment'],
            ],
          },
        });

        monaco.editor.defineTheme('hs-dark', {
          base: 'vs-dark',
          inherit: true,
          rules: [
            { token: 'keyword',           foreground: 'ff7b72' },
            { token: 'keyword.directive', foreground: 'd2a8ff' },
            { token: 'string',            foreground: 'a5d6ff' },
            { token: 'number',            foreground: '79c0ff' },
            { token: 'comment',           foreground: '8b949e', fontStyle: 'italic' },
            { token: 'type',              foreground: 'ffa657' },
            { token: 'operator',          foreground: 'ff7b72' },
          ],
          colors: {
            'editor.background':          '#0d1117',
            'editor.foreground':          '#e6edf3',
            'editorLineNumber.foreground':'#6e7681',
            'editor.lineHighlightBackground': '#161b22',
            'editorCursor.foreground':    '#58a6ff',
            'editor.selectionBackground': '#264f78',
          },
        });
      }

      // ---------------------------------------------------------------------------
      // Simple preview renderer using SVG placeholder (Three.js opt-in)
      // ---------------------------------------------------------------------------
      function createSvgPreview(container) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '100%');
        svg.style.position = 'absolute';
        svg.style.inset = '0';
        container.appendChild(svg);

        const orbMap = {};

        return {
          addBox: function (orb) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            const w = container.clientWidth || 400;
            const h = container.clientHeight || 300;
            const cx = w / 2 + (orb.position[0] || 0) * 60;
            const cy = h / 2 - (orb.position[1] || 0) * 60;
            const size = 30 * (orb.scale[0] || 1);

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', cx - size / 2);
            rect.setAttribute('y', cy - size / 2);
            rect.setAttribute('width', size);
            rect.setAttribute('height', size);
            rect.setAttribute('fill', orb.color);
            rect.setAttribute('opacity', orb.opacity);
            rect.setAttribute('rx', 4);

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', cx);
            text.setAttribute('y', cy + size / 2 + 14);
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('fill', '#8b949e');
            text.setAttribute('font-size', '10');
            text.textContent = orb.name;

            g.appendChild(rect);
            g.appendChild(text);
            svg.appendChild(g);
            orbMap[orb.id] = { g, rect, text };
          },
          updateBox: function (orb) {
            if (orbMap[orb.id]) {
              svg.removeChild(orbMap[orb.id].g);
              delete orbMap[orb.id];
            }
            this.addBox(orb);
          },
          removeBox: function (id) {
            if (orbMap[id]) {
              svg.removeChild(orbMap[id].g);
              delete orbMap[id];
            }
          },
          render: function () { /* SVG is immediate */ },
        };
      }

      // ---------------------------------------------------------------------------
      // Minimal inline parser (for preview)
      // ---------------------------------------------------------------------------
      function parseForPreview(source) {
        var nodes = [];
        var orbPattern = /\borb\s+"([^"]+)"\s*\{([^}]*)\}/g;
        var match;
        while ((match = orbPattern.exec(source)) !== null) {
          var name = match[1];
          var body = match[2];
          var props = {};
          body.split('\n').forEach(function (line) {
            var t = line.trim();
            if (!t || t[0] === '@') return;
            var ci = t.indexOf(':');
            if (ci === -1) return;
            var k = t.slice(0, ci).trim();
            var v = t.slice(ci + 1).trim();
            if (v[0] === '"' && v[v.length - 1] === '"') props[k] = v.slice(1, -1);
            else if (v[0] === '[') { try { props[k] = JSON.parse(v); } catch (e) {} }
            else if (v === 'true') props[k] = true;
            else if (v === 'false') props[k] = false;
            else { var n = parseFloat(v); if (!isNaN(n)) props[k] = n; }
          });
          nodes.push({ id: 'orb-' + name, type: 'orb', name: name, properties: props, traits: [] });
        }
        return nodes;
      }

      function nodeToOrb(node) {
        var p = node.properties;
        function vec3(val, def) {
          if (typeof val === 'number') return [val, val, val];
          if (Array.isArray(val) && val.length >= 3) return [+val[0], +val[1], +val[2]];
          return def;
        }
        return {
          id: node.id,
          name: node.name,
          color: typeof p.color === 'string' ? p.color : '#58a6ff',
          scale: vec3(p.scale, [1, 1, 1]),
          position: vec3(p.position, [0, 0, 0]),
          rotation: vec3(p.rotation, [0, 0, 0]),
          opacity: typeof p.opacity === 'number' ? p.opacity : 1,
          castShadow: p.castShadow !== false,
        };
      }

      // ---------------------------------------------------------------------------
      // Main init
      // ---------------------------------------------------------------------------
      var EXAMPLES = {
        'Hello Orb':
          'orb "Hello" {\n  color: "cyan"\n  scale: 1.0\n  position: [0, 0, -2]\n  @grabbable\n}',
        'Physics Sandbox':
          'orb "Box" {\n  color: "orange"\n  scale: 1.0\n  position: [0, 2, -3]\n  @physics { mass: 1.0 }\n}\n\norb "Floor" {\n  color: "gray"\n  scale: [10, 0.2, 10]\n  position: [0, -1, -3]\n  @physics { isStatic: true }\n}',
        'Multiplayer':
          'orb "Player1" {\n  color: "blue"\n  position: [-2, 0, -3]\n  @synced { rate: 30 }\n  @grabbable\n}\n\norb "Player2" {\n  color: "red"\n  position: [2, 0, -3]\n  @synced { rate: 30 }\n  @grabbable\n}',
        'Gallery':
          'template "Exhibit" {\n  scale: 1.0\n  castShadow: true\n}\n\norb "Sculpture1" {\n  ...Exhibit\n  color: "gold"\n  position: [-3, 0, -4]\n}\n\norb "Sculpture2" {\n  ...Exhibit\n  color: "silver"\n  position: [0, 0, -4]\n}\n\norb "Sculpture3" {\n  ...Exhibit\n  color: "bronze"\n  position: [3, 0, -4]\n}',
        'Accessible UI':
          'orb "Button" {\n  color: "blue"\n  scale: [2, 0.5, 0.1]\n  position: [0, 0, -1]\n  @accessible { role: "button", label: "Click me" }\n  @highlight { color: "#ffffff", onFocus: true }\n  @haptic { intensity: 0.5 }\n}',
      };

      function initPlayground(monaco) {
        document.getElementById('preview-placeholder').style.display = 'none';
        registerHoloScript(monaco);

        // Determine initial source from URL hash or default
        var initialSource = EXAMPLES['Hello Orb'];
        var hash = window.location.hash;
        if (hash && hash.length > 2) {
          try {
            var fragment = hash.startsWith('#') ? hash.slice(1) : hash;
            var si = fragment.indexOf('/');
            if (si !== -1) {
              var payload = fragment.slice(si + 1);
              var padded = payload.replace(/-/g, '+').replace(/_/g, '/');
              var pad = (4 - padded.length % 4) % 4;
              var b64 = padded + '==='.slice(0, pad);
              var json = atob(b64);
              var state = JSON.parse(json);
              if (state.source) initialSource = state.source;
            }
          } catch (e) { /* ignore */ }
        }

        // Create Monaco editor
        var editor = monaco.editor.create(document.getElementById('editor-container'), {
          value: initialSource,
          language: 'holoscript',
          theme: 'hs-dark',
          fontSize: 13,
          lineHeight: 20,
          minimap: { enabled: false },
          scrollBeyondLastLine: false,
          fontFamily: '"JetBrains Mono", "Cascadia Code", "Fira Code", monospace',
          fontLigatures: true,
          padding: { top: 12, bottom: 12 },
          wordWrap: 'on',
          automaticLayout: true,
        });

        // Create preview
        var previewContainer = document.getElementById('preview-container');
        var scene = createSvgPreview(previewContainer);

        var currentOrbs = {};

        function applyUpdate(nextOrbs) {
          var nextMap = {};
          nextOrbs.forEach(function (o) { nextMap[o.id] = o; });

          // Added/changed
          nextOrbs.forEach(function (orb) {
            if (!currentOrbs[orb.id]) {
              scene.addBox(orb);
            } else if (JSON.stringify(currentOrbs[orb.id]) !== JSON.stringify(orb)) {
              scene.updateBox(orb);
            }
            currentOrbs[orb.id] = orb;
          });

          // Removed
          Object.keys(currentOrbs).forEach(function (id) {
            if (!nextMap[id]) {
              scene.removeBox(id);
              delete currentOrbs[id];
            }
          });

          scene.render();

          // Update status
          var count = Object.keys(currentOrbs).length;
          document.getElementById('orb-count').textContent = count + (count === 1 ? ' orb' : ' orbs');
        }

        function renderPreview(source) {
          var t0 = performance.now();
          try {
            var nodes = parseForPreview(source);
            var orbs = nodes.map(nodeToOrb);
            applyUpdate(orbs);
            document.getElementById('status-text').textContent = 'OK';
            document.getElementById('status-text').className = 'status-ok';
            document.getElementById('parse-time').textContent = (performance.now() - t0).toFixed(1) + 'ms';
          } catch (err) {
            document.getElementById('status-text').textContent = 'Parse error';
            document.getElementById('status-text').className = 'status-err';
          }
        }

        renderPreview(initialSource);

        // Debounced live update
        var debounceTimer = null;
        editor.onDidChangeModelContent(function () {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            renderPreview(editor.getValue());
          }, 300);
        });

        // Example dropdown
        document.getElementById('example-select').addEventListener('change', function (e) {
          var name = e.target.value;
          if (name && EXAMPLES[name]) {
            editor.getModel().setValue(EXAMPLES[name]);
            e.target.value = '';
          }
        });

        // Share button
        document.getElementById('btn-share').addEventListener('click', function () {
          var source = editor.getValue();
          var json = JSON.stringify({ source: source });
          var b64 = btoa(json).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
          var hash = '#v0/' + b64;
          history.replaceState(null, '', hash);
          var url = window.location.href;
          navigator.clipboard.writeText(url).then(function () {
            showToast('URL copied to clipboard!');
          }).catch(function () {
            showToast('Share URL: ' + url);
          });
        });

        // Resizer drag
        var resizer = document.getElementById('resizer');
        var editorPane = document.getElementById('editor-pane');
        var isDragging = false;
        var startX = 0;
        var startW = 0;

        resizer.addEventListener('mousedown', function (e) {
          isDragging = true;
          startX = e.clientX;
          startW = editorPane.offsetWidth;
          resizer.classList.add('dragging');
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', function (e) {
          if (!isDragging) return;
          var delta = e.clientX - startX;
          var newW = Math.max(200, Math.min(startW + delta, window.innerWidth - 200));
          editorPane.style.width = newW + 'px';
        });

        document.addEventListener('mouseup', function () {
          if (isDragging) {
            isDragging = false;
            resizer.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
          }
        });

        // Hide placeholder
        document.getElementById('preview-placeholder').remove();
      }

      function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function () { t.classList.remove('show'); }, 2500);
      }
    })();
  </script>
</body>
</html>
