[package]
name = "spatial-engine-wasm"
version = "0.1.0"
edition = "2021"
description = "HoloScript spatial engine hot-path functions compiled to WebAssembly"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
opt-level = "s"   # Optimize for size
lto = true
