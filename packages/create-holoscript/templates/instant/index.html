<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoloScript — Instant</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
      canvas { display: block; width: 100%; height: 100%; }

      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0a0a1a; color: #fff; font-family: 'Inter', system-ui, sans-serif; z-index: 100;
        transition: opacity 0.5s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .loader { text-align: center; }
      .loader h1 {
        font-size: 1.4rem; font-weight: 600;
        background: linear-gradient(135deg, #00d4ff, #7b2ffa);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }
      .loader p { font-size: 0.85rem; color: #888; }
      .pulse {
        width: 40px; height: 40px; margin: 1rem auto; border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #7b2ffa);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }

      #hud {
        position: fixed; top: 1rem; left: 1rem;
        font-family: 'Inter', system-ui, sans-serif; font-size: 0.75rem;
        color: #666; z-index: 50;
      }

      #badge {
        position: fixed; bottom: 1rem; left: 1rem;
        font-family: 'Inter', system-ui, sans-serif; font-size: 0.7rem;
        color: #555; z-index: 50;
      }
      #badge a { color: #7b2ffa; text-decoration: none; }
      #badge a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loader">
        <div class="pulse"></div>
        <h1>HoloScript</h1>
        <p>Loading scene...</p>
      </div>
    </div>

    <div id="hud"><span id="fps"></span></div>
    <div id="badge">Built with <a href="https://github.com/brianonbased-dev/HoloScript" target="_blank">HoloScript</a></div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
