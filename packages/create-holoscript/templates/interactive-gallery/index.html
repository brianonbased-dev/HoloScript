<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoloScript — Hello World</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        color: #fff;
        font-family: 'Inter', system-ui, sans-serif;
        z-index: 100;
        transition: opacity 0.5s;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader {
        text-align: center;
      }
      .loader h1 {
        font-size: 1.4rem;
        font-weight: 600;
        background: linear-gradient(135deg, #00d4ff, #7b2ffa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }
      .loader p {
        font-size: 0.85rem;
        color: #888;
      }
      .pulse {
        width: 40px;
        height: 40px;
        margin: 1rem auto;
        border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #7b2ffa);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      #xr-button {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #7b2ffa, #00d4ff);
        color: #fff;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        z-index: 50;
        box-shadow: 0 4px 20px rgba(123, 47, 250, 0.4);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      #xr-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 30px rgba(123, 47, 250, 0.6);
      }
      #xr-button.hidden {
        display: none;
      }

      #hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.75rem;
        color: #666;
        z-index: 50;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loader">
        <div class="pulse"></div>
        <h1>🌐 HoloScript</h1>
        <p>Loading scene...</p>
      </div>
    </div>

    <div id="hud">
      <span id="fps"></span>
    </div>

    <button id="xr-button" class="hidden">Enter VR</button>

    <script type="module" src="/main.js"></script>
  </body>
</html>
