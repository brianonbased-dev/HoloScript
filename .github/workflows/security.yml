name: Security Scanning

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=medium --json-file-output=snyk-report.json

      - name: Upload Snyk scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Upload Snyk JSON report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: snyk-security-report
          path: snyk-report.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v5 (no v5 tag — pinned to v4.9.0)
        with:
          fail-on-severity: moderate  # Blocks moderate+ new deps. Override: open an issue with justification
          deny-licenses: GPL-3.0, AGPL-3.0  # Copyleft licenses would require HoloScript to also be GPL. Exception: open an issue with license justification

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        continue-on-error: true  # CodeQL is informational — outages or timeouts should not block PRs
        with:
          category: '/language:${{matrix.language}}'

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate --json > npm-audit.json || true
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30

  compiler-security:
    name: Compiler Injection Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run FlowLevel (Code Injection) Security Checks
        working-directory: packages/core
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx vitest run src/compiler/__tests__/FlowLevel.test.ts

  aggregate-results:
    name: Aggregate Vulnerability Metrics
    runs-on: ubuntu-latest
    needs: [snyk-scan, codeql-analysis, npm-audit, compiler-security]
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Download all security artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: security-artifacts/

      - name: Analyze Scans and Comment Error Logs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');

            let summary = '## 🛡️ Consolidated Security Report\n\n';
            summary += 'The pipeline has aggregated the following vulnerability metrics:\n\n';

            try {
              if (fs.existsSync('security-artifacts/npm-audit-report/npm-audit.json')) {
                const auditData = JSON.parse(fs.readFileSync('security-artifacts/npm-audit-report/npm-audit.json', 'utf8'));
                const vulns = auditData.metadata?.vulnerabilities || {};
                summary += '### NPM Audit\n';
                summary += `- 🟡 Moderate: ${vulns.moderate || 0}\n`;
                summary += `- 🟠 High: ${vulns.high || 0}\n`;
                summary += `- 🔴 Critical: ${vulns.critical || 0}\n\n`;
              }
            } catch(e) { summary += '*(NPM Audit missing or failed)*\n\n'; }

            try {
              if (fs.existsSync('security-artifacts/snyk-security-report/snyk-report.json')) {
                const snykData = JSON.parse(fs.readFileSync('security-artifacts/snyk-security-report/snyk-report.json', 'utf8'));
                // Snyk outputs an array of projects or a single project
                const vulnCount = Array.isArray(snykData) ? snykData.reduce((acc, p) => acc + (p.vulnerabilities?.length || 0), 0) : (snykData.vulnerabilities?.length || 0);
                summary += '### Snyk Scanner\n';
                summary += `- 🔒 ${vulnCount === 0 ? 'Zero vulnerabilities found!' : `${vulnCount} vulnerabilities found.`}\n\n`;
              }
            } catch(e) { summary += '*(Snyk check missing or failed)*\n\n'; }

            summary += '> **Note:** CodeQL dynamic code scanning results are available directly in your GitHub Security tab.\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
