name: MCP Quality Gate

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'
      - 'scripts/validate-mcp-tools.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'
      - 'scripts/validate-mcp-tools.mjs'

jobs:
  mcp-quality:
    name: MCP Tool Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MCP server tests import from workspace packages whose entrypoints are
      # `./dist/...` (per their package.json `exports`):
      #   @holoscript/framework/{economy,agents}, @holoscript/llm-provider,
      #   @holoscript/absorb-service/mcp, @holoscript/engine/hologram, etc.
      # Without a build step, vitest fails with "Failed to resolve entry" /
      # "Cannot find package" before any test runs. `pnpm build` builds core
      # first then everything else.
      - name: Build workspace packages
        run: pnpm build

      - name: Validate MCP tools
        run: node scripts/validate-mcp-tools.mjs

      - name: Run MCP server tests
        run: pnpm --filter @holoscript/mcp-server test
