name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Check roadmap drift markers
        run: pnpm docs:roadmap:drift

      - name: Check version lane policy
        run: pnpm version:check

      - name: Check architecture coupling guard
        run: pnpm architecture:check

      - name: Verify Claude plugin.json matches .claude/skills
        run: pnpm verify:claude-plugin-skills

      - name: Verify packages/*/src/ has no new JS or .d.ts shadows (allowlisted legacy only)
        run: pnpm verify:package-src-no-emit

      - name: Check hotspot test coverage
        run: pnpm tests:hotspots

      # SECURITY-mode gate (2026-04-20): stale .js/.d.ts shadows in src/
      # silently shadow the .ts source in Node module resolution. 224
      # found during Wave-2 item 5a debugging; 58 more cleaned during
      # the follow-up sweep. Pre-commit hook catches untracked shadows
      # locally (the primary dev-env-pollution threat); CI here catches
      # PRs that would ADD new tracked .js/.d.ts files in src/. Allows
      # the 12 existing tracked hand-crafted declarations (legacy; not
      # removed by this gate) while blocking new additions.
      - name: Check for new build-artifact shadows in src/
        run: |
          # Determine base commit: PR base for PRs, HEAD~1 for push events
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch --no-tags --prune origin "${{ github.base_ref }}" || true
          else
            BASE="HEAD~1"
          fi
          # Files added (not modified) by this PR/commit under src/
          NEW=$(git diff --name-only --diff-filter=A "$BASE"...HEAD 2>/dev/null \
            | grep -E '^packages/[^/]+/src/.*\.(js|js\.map|d\.ts|d\.ts\.map)$' || true)
          if [ -n "$NEW" ]; then
            echo "::error::This PR adds new .js/.d.ts shadow files in packages/*/src/"
            echo ""
            echo "New files:"
            echo "$NEW" | sed 's/^/  /'
            echo ""
            echo "packages/*/src/ should contain .ts sources only at runtime."
            echo "Committed .js/.d.ts can silently shadow .ts in Node module"
            echo "resolution (observed during Wave-2 item 5a debugging)."
            echo ""
            echo "If these files are intentional hand-crafted declarations,"
            echo "discuss with the founder before merging — the allowlist of"
            echo "12 tracked files is legacy, not growing."
            exit 1
          fi
          echo "✓ No new shadow files added by this PR/commit"

      - name: Repository health summary
        if: always()
        run: node scripts/repo-health.js --summary-only

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cmake and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ✨ OPTIMIZATION: Smart Rust caching (55% build time reduction)
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'holoscript-v1'
          cache-all-crates: true

      # ✨ OPTIMIZATION: Pre-built wasm-pack (5-7 min savings vs cargo install)
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build packages
        run: pnpm build

      # dist/ is gitignored; hololand-platform imports @holoscript/crdt-spatial/bridge from dist
      - name: Build @holoscript/crdt-spatial
        run: pnpm --filter @holoscript/crdt-spatial build

      - name: HoloMap package smoke (build + tests)
        run: |
          pnpm --filter @holoscript/holomap build
          pnpm --filter @holoscript/holomap test

      - name: Run TypeScript tests with coverage
        run: pnpm test:coverage || pnpm test

      - name: Run Rust cargo tests
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: |
          echo "::group::holoscript-component"
          cargo test --manifest-path packages/holoscript-component/Cargo.toml
          echo "::endgroup::"
          echo "::group::compiler-wasm"
          cargo test --manifest-path packages/compiler-wasm/Cargo.toml
          echo "::endgroup::"
          echo "::group::spatial-engine (build check)"
          cargo check --manifest-path packages/spatial-engine/Cargo.toml
          echo "::endgroup::"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: ${{ always() && secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./packages/*/coverage/lcov.info
          fail_ci_if_error: false  # Codecov is informational — outages and missing tokens should not block CI
          verbose: true
          flags: ${{ matrix.package || 'all' }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cmake and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev

      - name: Install Rust and wasm-pack
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build all packages
        run: pnpm build

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ✨ OPTIMIZATION: Smart Rust caching (55% build time reduction)
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'holoscript-v1'
          cache-all-crates: true

      # ✨ OPTIMIZATION: Pre-built wasm-pack (5-7 min savings vs cargo install)
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build packages
        run: pnpm build

      - name: Restore benchmark baseline
        uses: actions/cache@v5
        id: benchmark-cache
        with:
          path: .benchmark-baseline.json
          key: benchmark-baseline-${{ github.base_ref }}
          restore-keys: |
            benchmark-baseline-main
            benchmark-baseline-

      - name: Run benchmarks
        run: pnpm bench:ci > benchmark-results.json

      - name: Compare against baseline
        if: steps.benchmark-cache.outputs.cache-hit == 'true'
        run: |
          node --experimental-vm-modules packages/benchmark/dist/index.js --ci --compare=.benchmark-baseline.json || {
            echo "::error::Performance regression >5% detected. See benchmark-results.json for details."
            exit 1
          }

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

      - name: Comment PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));

            let body = '## 📊 Benchmark Results\n\n';

            for (const suite of results.suites) {
              body += `### ${suite.suite}\n\n`;
              body += '| Benchmark | Ops/sec | Mean (ms) | ±% |\n';
              body += '|-----------|---------|-----------|----|\n';

              for (const result of suite.results) {
                const ops = result.opsPerSecond.toLocaleString('en-US', { maximumFractionDigits: 0 });
                body += `| ${result.name} | ${ops} | ${result.meanMs.toFixed(3)} | ${result.marginOfError.toFixed(1)}% |\n`;
              }
              body += '\n';
            }

            body += `\n*Commit: ${results.commit || 'unknown'}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  benchmark-baseline:
    name: Update Benchmark Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ✨ OPTIMIZATION: Smart Rust caching (55% build time reduction)
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'holoscript-v1'
          cache-all-crates: true

      # ✨ OPTIMIZATION: Pre-built wasm-pack (5-7 min savings vs cargo install)
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build packages
        run: pnpm build

      - name: Run benchmarks
        run: pnpm bench:ci > .benchmark-baseline.json

      - name: Save benchmark baseline
        uses: actions/cache/save@v5
        with:
          path: .benchmark-baseline.json
          key: benchmark-baseline-main

  test-compilers:
    name: Compiler Golden-Output Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No Rust/WASM build needed — these are pure TypeScript compiler tests
      - name: Run compiler golden-output regression tests
        working-directory: packages/core
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx vitest run src/compiler/__tests__/golden-output/golden.test.ts

      - name: Run FlowLevel (Code Injection) Security Checks
        working-directory: packages/core
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx vitest run src/compiler/__tests__/FlowLevel.test.ts

      - name: Write compiler regression matrix to job summary
        if: always()
        shell: bash
        run: |
          echo "## Compiler Regression Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          targets=(Unity WebGPU Babylon URDF SDF WASM)
          for t in "${targets[@]}"; do
            if grep -q "FAIL.*${t}" /tmp/compiler-results.txt 2>/dev/null; then
              echo "| ${t} | ❌ FAIL |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ${t} | ✅ PASS |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Snapshot drift = compiler output changed without a deliberate update.*" >> "$GITHUB_STEP_SUMMARY"
          echo "*To regenerate: \`pnpm --filter @holoscript/core exec vitest run -u src/compiler/__tests__/golden-output/golden.test.ts\`*" >> "$GITHUB_STEP_SUMMARY"

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - path: infrastructure/Dockerfile.mcp-server
            target: builder
          - path: infrastructure/Dockerfile.absorb-service
            target: builder
          - path: infrastructure/Dockerfile.export-api
            target: builder
          - path: services/holoscript-net/Dockerfile
            target: builder
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker Image (Builder Stage)
        run: docker build -f ${{ matrix.path }} --target ${{ matrix.target }} .

  docker-compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate docker-compose.yml syntax
        run: docker compose -f docker-compose.yml config --quiet

