name: Publish NPM Packages

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build packages
        run: pnpm build

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Release guard
        run: node scripts/release-guard.js

      - name: Publish packages
        run: pnpm release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

    vscode-extension:
      name: Publish VSCode Extension
      runs-on: ubuntu-latest
      needs: test
      if: github.event_name == 'push' || github.event_name == 'release'

      steps:
        - uses: actions/checkout@v6

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: '20.x'

        - name: Install pnpm
          uses: pnpm/action-setup@v6

        - name: Install dependencies
          run: pnpm install --no-frozen-lockfile

        - name: Build extension
          run: pnpm --filter holoscript-vscode build

        - name: Package extension
          run: pnpm --filter holoscript-vscode package
          # Produces packages/vscode-extension/holoscript-vscode-*.vsix

        - name: Publish to VS Marketplace
          run: pnpm --filter holoscript-vscode publish
          env:
            VSCE_PAT: ${{ secrets.VSCE_TOKEN }}

        - name: Upload VSIX artifact
          uses: actions/upload-artifact@v7
          with:
            name: holoscript-vscode-vsix
            path: packages/vscode-extension/*.vsix
            retention-days: 30

        - name: Attach VSIX to GitHub Release
          uses: softprops/action-gh-release@v3
          with:
            files: packages/vscode-extension/*.vsix
          env:
            GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
