name: Publish MCP Server Image

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'
      - 'packages/core/**'
      - 'packages/crdt/**'
      - 'packages/llm-provider/**'
      - 'Dockerfile.mcp-server'
      - '.github/workflows/publish-mcp-image.yml'
  workflow_dispatch:

concurrency:
  group: publish-mcp-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read MCP server version
        id: version
        run: echo "version=$(node -p "require('./packages/mcp-server/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/holoscript-mcp-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
