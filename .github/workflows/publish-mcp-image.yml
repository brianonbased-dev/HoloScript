name: Publish MCP Server Image

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'
      - 'packages/core/**'
      - 'packages/crdt/**'
      - 'packages/agent-protocol/**'
      - 'packages/cli/**'
      - 'packages/llm-provider/**'
      - 'infrastructure/Dockerfile.mcp-server'
      - '.github/workflows/publish-mcp-image.yml'
  workflow_dispatch:

concurrency:
  # Serialize on main so the queue actually drains — the build takes ~10 min and
  # cancel-in-progress was killing every run when commits arrive faster than that.
  # Each push gets its own build slot in line; the latest commit's image always
  # eventually reaches Railway.
  group: publish-mcp-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read MCP server version
        id: version
        run: echo "version=$(node -p "require('./packages/mcp-server/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/holoscript-mcp-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,format=long,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infrastructure/Dockerfile.mcp-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Railway redeploy
        if: success()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway redeploy --service mcp-server -y
          echo "Waiting 15s for Railway to start..."
          sleep 15
          curl -sf https://mcp.holoscript.net/health > /dev/null && echo "MCP server healthy after redeploy" || echo "WARNING: MCP health check failed — server may still be starting. Check https://mcp.holoscript.net/health manually."
