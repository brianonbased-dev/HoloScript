name: 3D Preview

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.hsplus'
      - '**/*.holo'
      - 'examples/**/*.hs'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  preview:
    name: Generate 3D Previews
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Find changed HoloScript files
        id: changed-files
        run: |
          # Get the list of changed .hsplus/.holo/.hs files in this PR
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- \
            '*.hsplus' '*.holo' 'examples/*.hs' | head -20)

          if [ -z "$CHANGED" ]; then
            echo "No HoloScript files changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # Build space-separated file list for batch mode
            FILES_ARGS=""
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                FILES_ARGS="$FILES_ARGS $file"
              fi
            done <<< "$CHANGED"

            echo "files_args=$FILES_ARGS" >> $GITHUB_OUTPUT

            # Count for reporting
            COUNT=$(echo "$CHANGED" | wc -l | tr -d ' ')
            echo "file_count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Generate preview HTML files
        if: steps.changed-files.outputs.has_changes == 'true'
        id: generate
        run: |
          node scripts/generate-preview-html.js \
            --batch ${{ steps.changed-files.outputs.files_args }} \
            --outdir preview-output \
            --sha ${{ github.event.pull_request.head.sha }} \
            --pr ${{ github.event.pull_request.number }}

          # Generate an index page that lists all previews
          node scripts/generate-preview-index.js \
            preview-output/manifest.json \
            --pr ${{ github.event.pull_request.number }} \
            --sha ${{ github.event.pull_request.head.sha }}

      - name: Upload preview artifacts
        if: steps.changed-files.outputs.has_changes == 'true'
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: holoscript-3d-previews
          path: preview-output/
          retention-days: 30

      - name: Post PR comment with preview links
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('preview-output/manifest.json', 'utf-8'));
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            // Build the comment body
            let body = `## <img src="https://raw.githubusercontent.com/${owner}/${repo}/main/docs/public/logo.svg" width="20" height="20" alt="" /> HoloScript 3D Preview\n\n`;
            body += `> **${manifest.files.length}** interactive 3D scene${manifest.files.length !== 1 ? 's' : ''} compiled from \`${sha}\`\n\n`;

            // Scene summary cards
            for (const f of manifest.files) {
              body += `### \`${f.fileName}\`\n`;
              body += `- **Objects**: ${f.objectCount} 3D objects rendered\n`;
              body += `- **Geometry types**: ${getGeometryTypes(f.fileName, manifest)}\n\n`;
            }

            body += `---\n\n`;

            // Download and run instructions
            body += `#### View the Interactive 3D Previews\n\n`;
            body += `1. **Download** the preview artifact from the [workflow run](${artifactUrl})\n`;
            body += `2. **Extract** the \`holoscript-3d-previews\` zip file\n`;
            body += `3. **Open** any \`.html\` file in your browser\n\n`;

            body += `> The previews are self-contained HTML files with Three.js loaded from CDN.\n`;
            body += `> No build step or dependencies required -- just open in any modern browser.\n\n`;

            // Controls
            body += `<details>\n`;
            body += `<summary><b>Interactive controls</b></summary>\n\n`;
            body += `| Action | Mouse | Keyboard |\n`;
            body += `|--------|-------|----------|\n`;
            body += `| Orbit camera | Click + drag | - |\n`;
            body += `| Zoom | Scroll wheel | - |\n`;
            body += `| Pan | Right-click + drag | - |\n`;
            body += `| Reset camera | - | \`R\` |\n`;
            body += `| Toggle wireframe | - | \`W\` |\n`;
            body += `| Toggle grid | - | \`G\` |\n`;
            body += `| Toggle axes | - | \`A\` |\n`;
            body += `| View source code | - | \`C\` |\n`;
            body += `\n</details>\n\n`;

            // File listing
            body += `<details>\n`;
            body += `<summary><b>Generated files (${manifest.files.length})</b></summary>\n\n`;
            body += `| Source | Preview HTML | Objects |\n`;
            body += `|--------|-------------|--------:|\n`;
            for (const f of manifest.files) {
              body += `| \`${f.source}\` | \`${f.url}\` | ${f.objectCount} |\n`;
            }
            body += `\n</details>\n\n`;

            body += `---\n`;
            body += `*Generated by HoloScript 3D Preview Engine -- Three.js WebGL -- Commit \`${sha}\`*\n`;

            // Helper to extract geometry types from source (best-effort)
            function getGeometryTypes(fileName, manifest) {
              try {
                const entry = manifest.files.find(f => f.fileName === fileName);
                if (!entry) return 'various';
                const src = fs.readFileSync(entry.source, 'utf-8');
                const geos = new Set();
                const geoMatches = src.matchAll(/geometry\s*:\s*["'](\w+)["']/g);
                for (const m of geoMatches) geos.add(m[1]);
                if (geos.size === 0) return 'cube (default)';
                return Array.from(geos).join(', ');
              } catch { return 'various'; }
            }

            // Find and update existing comment, or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const marker = 'HoloScript 3D Preview';
            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
              console.log(`Updated existing preview comment: ${existing.id}`);
            } else {
              const result = await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
              console.log(`Created preview comment: ${result.data.id}`);
            }

      - name: Summary
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          echo "## HoloScript 3D Preview Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated interactive Three.js previews for **${{ steps.changed-files.outputs.file_count }}** HoloScript file(s)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the **holoscript-3d-previews** artifact to view the interactive 3D scenes in your browser." >> $GITHUB_STEP_SUMMARY

      - name: No changes detected
        if: steps.changed-files.outputs.has_changes != 'true'
        run: |
          echo "No HoloScript files were changed in this PR. Skipping 3D preview generation."
          echo "## HoloScript 3D Preview" >> $GITHUB_STEP_SUMMARY
          echo "No HoloScript files changed -- preview generation skipped." >> $GITHUB_STEP_SUMMARY
