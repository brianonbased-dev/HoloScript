name: Daemon PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'compositions/self-improve-daemon.hsplus'
      - 'packages/core/src/cli/**'
      - 'packages/core/src/runtime/**'
      - 'packages/core/src/traits/**'
      - '.github/workflows/daemon-pr.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'packages/core/package.json'

concurrency:
  group: daemon-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  daemon-integration-tests:
    name: Daemon Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daemon integration tests
        run: |
          pnpm --filter @holoscript/core exec vitest run \
            src/cli/__tests__/holoscript-runner.daemon.test.ts \
            src/cli/__tests__/holoscript-daemon-integration.test.ts

  daemon-pr-branch-run:
    name: Daemon PR Branch Run (1 cycle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: daemon-integration-tests
    if: ${{ github.event.pull_request.head.repo.fork == false && secrets.ANTHROPIC_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @holoscript/core build

      - name: Run daemon on PR branch (dry-run)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pnpm --filter @holoscript/core exec tsx src/cli/holoscript-runner.ts daemon \
            compositions/self-improve-daemon.hsplus \
            --cycles 1 \
            --model claude-3-5-haiku-20241022 \
            --debug

      - name: Upload daemon state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daemon-state-pr-${{ github.event.pull_request.number }}
          path: |
            .holoscript/daemon-state.json
            .holoscript/daemon.lock
          if-no-files-found: warn
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          echo "## Daemon PR Run" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: dry-run (no --commit)" >> $GITHUB_STEP_SUMMARY
          echo "- Composition: compositions/self-improve-daemon.hsplus" >> $GITHUB_STEP_SUMMARY
          echo "- Cycles: 1" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY

  daemon-pr-branch-run-skipped:
    name: Daemon PR Branch Run Skipped
    runs-on: ubuntu-latest
    needs: daemon-integration-tests
    if: ${{ github.event.pull_request.head.repo.fork == true || secrets.ANTHROPIC_API_KEY == '' }}

    steps:
      - name: Explain skip reason
        run: |
          echo "## Daemon PR Run Skipped" >> $GITHUB_STEP_SUMMARY
          echo "This PR is from a fork or ANTHROPIC_API_KEY is unavailable." >> $GITHUB_STEP_SUMMARY
          echo "Daemon integration tests still ran successfully in CI." >> $GITHUB_STEP_SUMMARY
