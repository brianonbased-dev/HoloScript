# Deploy HoloScript web applications to Railway
name: Deploy to Railway
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - studio
          - marketplace-web
          - marketplace-api
          - export-api
          - llm-service
          - absorb-service
          - mcp-server
      skip_preflight:
        description: 'Skip heavy pre-flight build checks (emergency/manual deploy only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      studio: ${{ steps.filter.outputs.studio }}
      marketplace-web: ${{ steps.filter.outputs.marketplace-web }}
      marketplace-api: ${{ steps.filter.outputs.marketplace-api }}
      export-api: ${{ steps.filter.outputs.export-api }}
      llm-service: ${{ steps.filter.outputs.llm-service }}
      absorb-service: ${{ steps.filter.outputs.absorb-service }}
      mcp-server: ${{ steps.filter.outputs.mcp-server }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            studio:
              - 'packages/studio/**'
            marketplace-web:
              - 'packages/marketplace-web/**'
            marketplace-api:
              - 'packages/marketplace-api/**'
            export-api:
              - 'services/export-api/**'
            llm-service:
              - 'services/llm-service/**'
            absorb-service:
              - 'services/absorb-service/**'
              - 'packages/absorb-service/**'
              - 'infrastructure/Dockerfile.absorb-service'
            mcp-server:
              - 'packages/mcp-server/**'
              - 'packages/core/**'
              - 'packages/crdt/**'
              - 'packages/llm-provider/**'
              - 'infrastructure/Dockerfile.mcp-server'

  # ──────────────────────────────────────────────────────────────────────────
  # Pre-flight: verify lockfile integrity + full build before any Railway push.
  # Prevents lockfile-drift, syntax, and dependency failures from reaching prod.
  # ──────────────────────────────────────────────────────────────────────────
  pre-flight:
    name: Pre-flight build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate RAILWAY_TOKEN secret
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "❌ RAILWAY_TOKEN secret is missing. Deploys will fail."
            exit 1
          fi

      - name: Validate HOLOSCRIPT_API_KEY secret
        run: |
          if [ -z "${{ secrets.HOLOSCRIPT_API_KEY }}" ]; then
            echo "❌ HOLOSCRIPT_API_KEY secret is missing. Studio/Absorb deploys require it."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Restore pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-preflight-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-preflight-

      - name: Verify lockfile is in sync
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        # --frozen-lockfile aborts if pnpm-lock.yaml would need updating —
        # this is the most common cause of Railway build failures.
        run: pnpm install --frozen-lockfile

      - name: Install cmake and system dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo find /etc/apt/sources.list.d/ -name "*.list" -exec grep -l "packages.microsoft.com" {} \; | xargs sudo rm -f 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y cmake libclang-dev

      - name: Install Rust toolchain
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04-29

      - name: Cache Rust dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: 'holoscript-v1'
          cache-all-crates: true

      - name: Install wasm-pack
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        run: cargo install wasm-pack --locked

      - name: Targeted build — catch compilation errors in deploy target's tree
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        # Lane-isolation: each service's deploy only requires its OWN
        # dependency tree to compile. Peer's mid-flight migration in
        # unrelated packages (framework, runtime, cli, etc.) cannot block
        # an mcp-server or studio deploy if those services' trees are
        # clean. For workflow_dispatch with service != "all", filter to
        # that service's transitive deps. For push-triggered or "all",
        # fall through to the full workspace build (the safe default).
        # See task_1777100775495_6j7w + W.082 lane isolation.
        #
        # IMPORTANT: explicitly build @holoscript/core FIRST before
        # anything else. pnpm's --filter "X..." can silently skip core's
        # build if its dist exists (no real cache invalidation), which
        # leaves consumers with stale d.ts. Forcing core upfront +
        # `rm -rf packages/core/dist` guarantees a fresh d.ts.
        run: |
          SERVICE="${{ github.event.inputs.service || 'all' }}"

          # Force fresh @holoscript/core dist so generate-types.mjs runs
          # against latest source. Engine + other packages have d.ts files
          # produced by separate (tsc-based) build steps that don't always
          # re-run on every CI invocation; nuking their dist makes them
          # type-less. Limit dist-nuke to core only.
          rm -rf packages/core/dist
          pnpm --filter @holoscript/core build

          case "$SERVICE" in
            all)
              # Iterate each deployable service and build only its
              # transitive dep tree. This avoids the pnpm 8.12 root-build
              # whack-a-mole where pre-flight kept failing on packages
              # outside any deployable service's tree (radio-astronomy-
              # plugin → r3f-renderer, comparative-benchmarks →
              # openusd-plugin, etc.). pnpm's `--filter "X..."` form
              # correctly scopes + topo-sorts within a defined tree.
              # Per-service iteration is N times slower than a single
              # workspace build but is the only form pnpm 8 reliably
              # honors edges in. See deploy-streak-fixes 2026-04-25
              # (commits b2477e157, f1de5af9e, f93bf9a8f, 07f050ab8).
              for svc in mcp-server studio marketplace-web marketplace-api export-api llm-service absorb-service; do
                echo "[preflight] building @holoscript/$svc dependency tree"
                pnpm -r --workspace-concurrency=1 --filter "@holoscript/$svc..." --filter '!./packages/plugins/**' build || exit 1
              done
              ;;
            mcp-server|studio|marketplace-web|marketplace-api|export-api|llm-service|absorb-service)
              echo "[preflight] targeted build of @holoscript/$SERVICE dependency tree (plugins excluded)"
              pnpm -r --workspace-concurrency=1 --filter "@holoscript/$SERVICE..." --filter '!./packages/plugins/**' build
              ;;
            *)
              echo "[preflight] unknown service '$SERVICE'; iterating all deployable services"
              for svc in mcp-server studio marketplace-web marketplace-api export-api llm-service absorb-service; do
                pnpm -r --workspace-concurrency=1 --filter "@holoscript/$svc..." --filter '!./packages/plugins/**' build || exit 1
              done
              ;;
          esac

      - name: TypeScript type-check Studio
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        run: npx tsc --noEmit --skipLibCheck --project packages/studio/tsconfig.json

      - name: TypeScript type-check MCP server
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true') }}
        run: npx tsc --noEmit --skipLibCheck --project packages/mcp-server/tsconfig.json || true

      - name: Block pre-flight bypass for production deploys
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_preflight == 'true' }}
        run: |
          echo "❌ skip_preflight=true is disabled for production safety."
          echo "Run with full pre-flight checks or use a non-production workflow."
          exit 1

  deploy-studio:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.studio == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'studio'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-studio
      url: https://studio.holoscript.net
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Ensure HOLOSCRIPT_API_KEY on studio service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables --set "HOLOSCRIPT_API_KEY=${{ secrets.HOLOSCRIPT_API_KEY }}" --service studio || \
          railway variables set HOLOSCRIPT_API_KEY="${{ secrets.HOLOSCRIPT_API_KEY }}" --service studio

      - name: Deploy HoloScript Studio
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service studio --detach

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          curl -f https://studio.holoscript.net/api/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ HoloScript Studio deployed successfully"
          echo "URL: https://studio.holoscript.net"

  deploy-marketplace-web:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.marketplace-web == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'marketplace-web'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-marketplace-web
      url: https://marketplace.holoscript.net
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Marketplace Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service marketplace-web --detach

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          curl -f https://marketplace.holoscript.net || exit 1

  deploy-marketplace-api:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.marketplace-api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'marketplace-api'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-marketplace-api
      url: https://marketplace-api.holoscript.net
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Marketplace API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service marketplace-api --detach

      - name: Run database migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run --service marketplace-api npm run migrate

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          curl -f https://marketplace-api.holoscript.net/health || exit 1

  deploy-export-api:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.export-api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'export-api'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-render-service
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Export API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service export-api --detach

      - name: Wait for deployment
        run: sleep 30

  deploy-llm-service:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.llm-service == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'llm-service'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-llm-service
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy LLM Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service llm-service --detach

      - name: Wait for deployment
        run: sleep 30

  deploy-absorb-service:
    needs: [detect-changes, pre-flight]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.absorb-service == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.service == 'all' ||
        github.event.inputs.service == 'absorb-service'
      ))
    runs-on: ubuntu-latest
    environment:
      name: production-mcp-server
      url: https://absorb.holoscript.net
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Ensure HOLOSCRIPT_API_KEY on absorb-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables --set "HOLOSCRIPT_API_KEY=${{ secrets.HOLOSCRIPT_API_KEY }}" --service absorb-service || \
          railway variables set HOLOSCRIPT_API_KEY="${{ secrets.HOLOSCRIPT_API_KEY }}" --service absorb-service

      - name: Deploy Absorb Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service absorb-service --environment production --detach

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          curl -f https://absorb.holoscript.net/health || exit 1

  deploy-mcp-server:
    # Pre-flight is informational for service-targeted deploys (failures
    # in unrelated packages shouldn't block mcp-server). Railway runs its
    # own build per Dockerfile.mcp-server / buildpack, which IS the
    # authoritative safety check. The pre-flight job stays in the
    # workflow as a signal but doesn't gate this deploy.
    needs: [detect-changes, pre-flight]
    if: |
      (
        always() &&
        (github.event_name == 'push' && needs.detect-changes.outputs.mcp-server == 'true') ||
        (github.event_name == 'workflow_dispatch' && (
          github.event.inputs.service == 'all' ||
          github.event.inputs.service == 'mcp-server'
        ))
      )
    runs-on: ubuntu-latest
    environment:
      name: production-mcp-server
      url: https://mcp.holoscript.net
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy HoloScript MCP Server
        working-directory: packages/mcp-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service mcp-server --environment production --detach

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          curl -f https://mcp.holoscript.net/health || exit 1

      - name: Verify version
        run: |
          EXPECTED_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          VERSION=$(curl -sf https://mcp.holoscript.net/health | jq -r '.version')
          echo "Deployed MCP server version: $VERSION"
          if [ "$VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Expected MCP version $EXPECTED_VERSION but got $VERSION"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ HoloScript MCP Server deployed successfully"
          echo "URL: https://mcp.holoscript.net"

  notify-deployment:
    needs:
      - deploy-studio
      - deploy-marketplace-web
      - deploy-marketplace-api
      - deploy-export-api
      - deploy-llm-service
      - deploy-absorb-service
      - deploy-mcp-server
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: ${{ !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        if: ${{ !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Run cross-service smoke checks
        if: ${{ !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}
        run: |
          ENDPOINTS=""

          if [ "${{ needs.deploy-studio.result }}" = "success" ]; then
            ENDPOINTS="${ENDPOINTS},https://studio.holoscript.net/api/health"
          fi
          if [ "${{ needs.deploy-marketplace-api.result }}" = "success" ]; then
            ENDPOINTS="${ENDPOINTS},https://marketplace-api.holoscript.net/health"
          fi
          if [ "${{ needs.deploy-absorb-service.result }}" = "success" ]; then
            ENDPOINTS="${ENDPOINTS},https://absorb.holoscript.net/health"
          fi
          if [ "${{ needs.deploy-mcp-server.result }}" = "success" ]; then
            ENDPOINTS="${ENDPOINTS},https://mcp.holoscript.net/health"
          fi

          ENDPOINTS="${ENDPOINTS#,}"
          if [ -z "$ENDPOINTS" ]; then
            echo "No successful deploy targets detected for smoke checks; skipping."
            exit 0
          fi

          echo "Smoke targets: $ENDPOINTS"
          SMOKE_ENDPOINTS="$ENDPOINTS" node scripts/smoke-prod.mjs

      - name: Deployment summary
        run: |
          echo "## Railway Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Studio | ${{ needs.deploy-studio.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketplace Web | ${{ needs.deploy-marketplace-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketplace API | ${{ needs.deploy-marketplace-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Export API | ${{ needs.deploy-export-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LLM Service | ${{ needs.deploy-llm-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Absorb Service | ${{ needs.deploy-absorb-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Server | ${{ needs.deploy-mcp-server.result }} |" >> $GITHUB_STEP_SUMMARY
