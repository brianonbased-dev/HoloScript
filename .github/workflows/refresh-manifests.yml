name: Refresh manifests (provenance + papers-status + live-evidence)

# Auto-refresh the holoscript.net manifests committed under docs/public/.
# Closes ai-ecosystem board task: task_1777316737268_nxgx.
#
# Why: scripts/build-provenance-manifest.mjs derives drift status from the
# CURRENT sha256 of every paper / memo on disk in the sibling ai-ecosystem
# repo. Every \todo closure, every research/*.tex commit on ai-ecosystem
# silently flips at least one row from BASE_CONFIRMED -> BASE_DRIFTED until
# the manifest is rebuilt and committed here. Same for papers-status (F.030
# / W.103) and live-evidence (last-anchor + last-commit + fleet aggregates).
#
# Manual refresh shipped 2026-04-26 caught 9 receipts that had drifted
# overnight. This workflow makes that refresh structural:
#
#   1. cron every 6h          - floor; catches passive drift quickly
#   2. workflow_dispatch      - manual on-demand
#   3. repository_dispatch    - push-near-realtime when ai-ecosystem fires
#                                the matching notify-holoscript.yml workflow
#                                (event type: ai-ecosystem-research-changed)
#
# Honest scope of the cron: 6h is the floor. When the dispatch trigger is
# wired (requires HOLOSCRIPT_DISPATCH_PAT secret on the ai-ecosystem repo),
# refresh latency drops to ~push + 1 min. Without the dispatch, worst-case
# staleness is the cron interval.

on:
  workflow_dispatch:
permissions:
  contents: write   # publish refreshed manifests to an automation branch
  pull-requests: write

concurrency:
  group: refresh-manifests
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh provenance + papers-status + live-evidence manifests
    runs-on: ubuntu-latest
    # A rerun on 2026-05-07 was cancelled before any steps executed because
    # the hosted runner queue consumed the previous 15-minute budget.
    timeout-minutes: 45

    steps:
      - name: Checkout HoloScript main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Clone sibling ai-ecosystem repo
        env:
          # ai-ecosystem is private — clone needs a PAT with read access.
          # Same physical PAT as HOLOSCRIPT_DISPATCH_PAT on the ai-eco side
          # (admin on both repos) but stored under a HoloScript-side name.
          AI_ECOSYSTEM_READ_PAT: ${{ secrets.AI_ECOSYSTEM_READ_PAT }}
        run: |
          # The manifest builders default to ../ai-ecosystem (sibling path)
          # via AI_ECO_ROOT / --ai-eco=. Clone shallow to keep CI minutes down,
          # but full enough that paper-audit-matrix-auto-rebuild.mjs can run
          # `git log` per file (it tolerates shallow history - missing commits
          # just degrade the matrix last-touched hint).
          if [ -z "$AI_ECOSYSTEM_READ_PAT" ]; then
            echo "::error::AI_ECOSYSTEM_READ_PAT secret not set; cannot clone private ai-ecosystem repo."
            echo "Founder action: gh secret set AI_ECOSYSTEM_READ_PAT --repo brianonbased-dev/HoloScript"
            exit 1
          fi
          git clone --depth=50 \
            "https://oauth2:${AI_ECOSYSTEM_READ_PAT}@github.com/brianonbased-dev/ai-ecosystem.git" \
            ../ai-ecosystem
          echo "AI_ECO_ROOT=$GITHUB_WORKSPACE/../ai-ecosystem" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Build provenance manifest
        run: node scripts/build-provenance-manifest.mjs

      - name: Build papers-status manifest
        run: node scripts/build-papers-status-manifest.mjs

      - name: Build live-evidence manifest
        run: |
          # Shipped in HoloScript commit ed05f577d. Graceful skip if the file
          # is removed in a future refactor.
          if [ -f scripts/build-live-evidence-manifest.mjs ]; then
            echo "[live-evidence] builder present - running"
            node scripts/build-live-evidence-manifest.mjs
          else
            echo "[live-evidence] builder not present - skipping"
          fi

      - name: Publish refreshed manifests branch (if changed)
        run: |
          set -e
          # Stage the known manifest paths explicitly (per W.082 - never
          # `git add -A` in CI). The third path is harmless if absent.
          git add docs/public/provenance-manifest.json docs/public/papers-status.json 2>/dev/null || true
          if [ -f docs/public/live-evidence.json ]; then
            git add docs/public/live-evidence.json
          fi

          # Honest no-diff path - keeps history clean when manifests are
          # already fresh (e.g. someone just ran the builders manually).
          if git diff --cached --quiet; then
            echo "[refresh-manifests] no diff in any manifest - already fresh, skipping commit"
            exit 0
          fi

          git config user.name  "manifest-refresh-bot"
          git config user.email "bot@holoscript.net"

          # Build a short summary of what changed for the commit message.
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          TRIGGER="${GITHUB_EVENT_NAME}"
          MSG=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n%s' \
            "docs(manifests): auto-refresh - ${TRIGGER}" \
            "Refreshed: ${CHANGED}" \
            "Trigger: ${TRIGGER}" \
            "Run: ${GH_RUN_URL:-n/a}" \
            "Closes ai-ecosystem board task: task_1777316737268_nxgx." \
            "Generated by refresh-manifests; merge after required checks pass.")
          git commit -m "$MSG"

          # main is protected, so the workflow publishes a stable refresh branch
          # and opens/updates a PR instead of attempting a direct protected push.
          BRANCH="automation/refresh-manifests"
          PR_TITLE="docs(manifests): auto-refresh - ${TRIGGER}"
          PR_BODY=$(printf '%s\n\n%s\n%s\n%s\n' \
            "Automated manifest refresh generated by refresh-manifests." \
            "Refreshed: ${CHANGED}" \
            "Trigger: ${TRIGGER}" \
            "Run: ${GH_RUN_URL:-n/a}")

          git fetch origin "${BRANCH}" --depth=1 || true
          git push --force-with-lease origin HEAD:"${BRANCH}"

          PR_URL=$(gh pr view "${BRANCH}" --repo "${GITHUB_REPOSITORY}" --json url --jq .url 2>/dev/null || true)
          if [ -n "${PR_URL}" ]; then
            gh pr edit "${PR_URL}" --repo "${GITHUB_REPOSITORY}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "[refresh-manifests] updated PR: ${PR_URL}"
          else
            PR_URL=$(gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}")
            echo "[refresh-manifests] created PR: ${PR_URL}"
          fi
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.AI_ECOSYSTEM_READ_PAT }}
