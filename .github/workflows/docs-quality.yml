name: Docs Quality

on:
  workflow_dispatch:
jobs:
  docs-build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Build docs
        working-directory: docs
        run: npm run build

  docs-markdown:
    name: Markdown Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Collect changed docs
        id: changed-docs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only --diff-filter=ACMR "$base" HEAD -- \
            docs/packages \
            docs/guides \
            DOCS_AUDIT_COMPLETE.md |
            grep -E '\.md$|^DOCS_AUDIT_COMPLETE\.md$' > changed-docs.txt || true

          if [[ ! -s changed-docs.txt ]]; then
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
            echo "No changed docs markdown files."
            exit 0
          fi

          echo "has_docs=true" >> "$GITHUB_OUTPUT"
          cat changed-docs.txt

      - name: Lint key docs surfaces
        if: steps.changed-docs.outputs.has_docs == 'true'
        run: xargs -r -d '\n' npx markdownlint-cli2 --config .markdownlint-docs.json < changed-docs.txt

      - name: Check roadmap drift markers
        if: steps.changed-docs.outputs.has_docs == 'true'
        run: pnpm docs:roadmap:drift

      - name: Check docs count drift markers
        if: steps.changed-docs.outputs.has_docs == 'true'
        run: pnpm docs:counts:drift

  typedoc-api:
    name: TypeDoc API reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: holoscript-typedoc-verify

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: 'latest'

      - name: Build core (TypeDoc reads compiled outputs)
        run: pnpm --filter @holoscript/core build

      - name: Generate TypeDoc
        run: pnpm docs:api

      - name: Verify generated API docs
        shell: bash
        run: |
          test -f docs/api/index.html || { echo "::error::TypeDoc did not emit docs/api/index.html"; ls -la docs/api || true; exit 1; }
          echo "✓ TypeDoc output present"
