name: Release Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance:
    name: Release Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version policy (all package versions must be in sync)
        run: node scripts/check-version-policy.js

      - name: Check syncpack consistency (workspace deps use workspace:* not pinned versions)
        run: pnpm syncpack:check

      - name: Validate A2A parity (agent task schema matches across all packages)
        run: node scripts/validate-a2a-parity.mjs

      - name: Validate MCP tool quality (all registered tools have descriptions and valid schemas)
        run: node scripts/validate-mcp-tools.mjs

      - name: Check changeset status (pending changesets for unreleased changes)
        run: npx changeset status
