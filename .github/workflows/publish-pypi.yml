name: Publish Python Package to PyPI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target (testpypi or pypi)'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          cd packages/python-bindings
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd packages/python-bindings
          pytest tests/ -v --tb=short

      - name: Type check with mypy
        run: |
          cd packages/python-bindings
          mypy holoscript/ --ignore-missing-imports

  build-and-publish:
    name: Build and Publish to PyPI
    needs: test-python
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    environment:
      name: ${{ github.event.inputs.environment || 'pypi' }}
      url: ${{ github.event.inputs.environment == 'testpypi' && 'https://test.pypi.org/p/holoscript' || 'https://pypi.org/p/holoscript' }}

    permissions:
      id-token: write # Required for trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatch

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev" >> $GITHUB_OUTPUT
          fi

      - name: Validate version alignment
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          NPM_MAJOR=$(node -e "console.log(require('./package.json').version.split('.')[0])")
          TAG_MAJOR=$(echo "$TAG_VERSION" | cut -d. -f1)

          if [ "$TAG_MAJOR" != "$NPM_MAJOR" ]; then
            echo "::error::PyPI tag major ($TAG_MAJOR) does not match npm root major ($NPM_MAJOR)"
            echo "Either align the tag or document the intentional divergence in docs/guides/release-versioning.md"
            exit 1
          fi

          echo "Version alignment OK: tag=$TAG_VERSION, npm major=$NPM_MAJOR"

      - name: Update version in pyproject.toml (if tag-based release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd packages/python-bindings
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          # Also update __init__.py version
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" holoscript/__init__.py
          echo "Updated to version: $VERSION"

      - name: Build distribution packages
        run: |
          cd packages/python-bindings
          python -m build

      - name: List built packages
        run: ls -la packages/python-bindings/dist/

      - name: Check distribution with twine
        run: |
          pip install twine
          twine check packages/python-bindings/dist/*

      - name: Publish to TestPyPI
        if: github.event.inputs.environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-bindings/dist/
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

      - name: Publish to PyPI
        if: github.event.inputs.environment != 'testpypi' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-bindings/dist/
          print-hash: true

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ steps.get_version.outputs.VERSION }}
          path: packages/python-bindings/dist/
          retention-days: 30

  # Verify the published package can be installed
  verify-install:
    name: Verify Published Package
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install from PyPI
        run: |
          # Wait for PyPI to process the upload
          sleep 30
          pip install holoscript==${{ needs.build-and-publish.outputs.version }}

      - name: Smoke test
        run: |
          python -c "
          from holoscript import parse, validate, list_traits
          result = parse('cube { @color(red) @position(0, 1, 0) @grabbable }')
          print(f'Parse success: {result.success}')
          traits = list_traits()
          print(f'Traits available: {len(traits)}')
          print('✅ PyPI install smoke test passed')
          "
