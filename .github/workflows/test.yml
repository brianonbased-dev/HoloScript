name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core Tests (44K+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Workspace packages publish from `./dist/...` exports — vitest can't
      # resolve `@holoscript/mesh`, `@holoscript/platform`, etc. from inside
      # core's tests until those packages are built. `pnpm build` builds
      # core first then everything else (per package.json scripts.build).
      - name: Build workspace packages
        run: pnpm build
      - name: Run core tests (sharded, 16GB heap)
        run: node --max-old-space-size=16384 run-vitest.mjs
        working-directory: packages/core
        env:
          NODE_OPTIONS: '--max-old-space-size=16384'

  test-studio:
    name: Studio Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Studio tests import from `@holoscript/uaal`, `@holoscript/config`,
      # `@holoscript/mesh`, `@holoscript/platform`, `@holoscript/snn-webgpu`,
      # `@holoscript/config/endpoints` — all `./dist/...` exports. Build all
      # workspace packages first.
      - name: Build workspace packages
        run: pnpm build
      - run: pnpm --filter @holoscript/studio test
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

  test-snn-webgpu:
    name: SNN WebGPU Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build core first (snn-webgpu has @holoscript/core as a peerDep that
      # the tests import from `./dist/...` exports).
      - name: Build core
        run: pnpm --filter @holoscript/core build
      - run: pnpm --filter @holoscript/snn-webgpu test
