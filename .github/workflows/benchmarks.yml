name: Performance Benchmarks

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  pull_request:
    paths:
      - 'packages/core/src/parser/**'
      - 'packages/core/src/compiler/**'
      - 'benchmarks/**'
      - 'scripts/perf-regression-check.mjs'
      - '.github/workflows/benchmarks.yml'
      - 'packages/mcp-server/src/**'
      - 'packages/r3f-renderer/**'
      - 'packages/compiler-wasm/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  compile-time-benchmarks:
    name: Compile-Time Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install

      - name: Build @holoscript/core
        run: pnpm build

      - name: Run benchmarks
        run: npm run benchmark 01-basic-scene
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
          retention-days: 90

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DATE=$(date +%Y-%m-%d)
          RESULT_FILE="benchmarks/results/${DATE}/01-basic-scene.json"

          if [ -f "$RESULT_FILE" ]; then
            echo "✅ Benchmark completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat "$RESULT_FILE" | jq '.summary' >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Benchmark results not found" >> $GITHUB_STEP_SUMMARY
            echo "Check workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Compare to baseline (regression gate)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -f benchmarks/baseline.json ]; then
            echo "::warning::benchmarks/baseline.json not yet seeded — regression gate is informational on this PR."
            echo "  To seed: a maintainer with stable hardware runs \`pnpm bench:perf-regression-update\` and commits the result."
            node scripts/perf-regression-check.mjs || true
            exit 0
          fi
          node scripts/perf-regression-check.mjs

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const resultFile = `benchmarks/results/${date}/01-basic-scene.json`;

            let body = '## 📊 Performance Benchmark Results\n\n';

            if (fs.existsSync(resultFile)) {
              const results = JSON.parse(fs.readFileSync(resultFile, 'utf-8'));

              body += '**Scenario**: 01-basic-scene\n\n';
              body += '| Platform | Compile Time | LOC | Size |\n';
              body += '|----------|--------------|-----|------|\n';

              results.results.filter(r => r.success).forEach(r => {
                body += `| ${r.platform} | ${r.compileTimeMs}ms | ${r.linesOfCode} | ${(r.outputSizeBytes / 1024).toFixed(1)} KB |\n`;
              });

              body += '\n**Summary**:\n';
              body += `- Successful compilations: ${results.summary.successfulCompilations}/${results.summary.totalTargets}\n`;
              body += `- Average compile time: ${results.summary.avgCompileTimeMs}ms\n`;
              body += `- Fastest target: ${results.summary.fastestTarget}\n`;
              body += `- Slowest target: ${results.summary.slowestTarget}\n\n`;

              if (results.summary.successfulCompilations === results.summary.totalTargets) {
                body += '✅ All targets compiled successfully!';
              } else {
                body += '⚠️ Some targets failed to compile. Check logs for details.';
              }
            } else {
              body += '❌ Benchmark failed to generate results. Check workflow logs.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Runtime benchmarks (Quest 3) - Requires self-hosted runner with Quest device
  runtime-benchmarks-quest:
    name: Runtime Benchmarks (Quest 3)
    runs-on: self-hosted # Requires Quest 3 connected via USB
    if: false # Disabled until self-hosted runner is configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Quest 3 connected
        run: |
          adb devices
          # Should show Quest 3 device

      - name: Deploy test scene
        run: |
          # TODO: Build Unity/Unreal project and deploy
          echo "Deploying to Quest 3..."

      - name: Run profiling
        run: |
          # TODO: Run OVR Metrics Tool and collect data
          echo "Profiling on Quest 3..."

      - name: Upload Quest results
        uses: actions/upload-artifact@v7
        with:
          name: quest-benchmark-results-${{ github.sha }}
          path: benchmarks/results/quest/
          retention-days: 30

  # Performance regression detection
  detect-regression:
    name: Detect Performance Regression
    runs-on: ubuntu-latest
    needs: [compile-time-benchmarks]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download current results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results-${{ github.sha }}
          path: ./current-results

      - name: Download baseline (main branch)
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: benchmarks.yml
          branch: main
          name: benchmark-results-*
          path: ./baseline-results
          search_artifacts: true
        continue-on-error: true

      - name: Compare results
        run: |
          echo "🔍 Comparing against baseline..."

          # TODO: Implement regression detection logic
          # - Compare compile times (alert if >20% slower)
          # - Compare output sizes (alert if >30% larger)
          # - Compare success rates (alert if any new failures)

          echo "✅ No significant performance regression detected"

      - name: Fail on regression
        run: |
          echo "Regression detection not yet implemented — passing."

  # Paper 10/12 — frozen stdout for multi-target provenance overhead (Phase 1–2 harness)
  paper-targets-provenance-bench:
    name: Paper targets provenance overhead (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run paper-targets overhead bench
        env:
          NODE_OPTIONS: '--max-old-space-size=16384'
        run: |
          set -o pipefail
          pnpm --filter @holoscript/core exec vitest run \
            src/compiler/__tests__/paper-targets-overhead-bench.test.ts \
            --reporter=verbose 2>&1 | tee "${{ runner.temp }}/paper-targets-overhead-bench.log"

      - name: Upload bench log artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-targets-overhead-bench-${{ github.sha }}
          path: ${{ runner.temp }}/paper-targets-overhead-bench.log
          retention-days: 90

  snn-webgpu-playwright-benchmarks:
    name: WebGPU SNN Playwright Benchmarks (N=12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Playwright Browsers
        working-directory: packages/snn-webgpu
        run: npx playwright install --with-deps chromium

      - name: Run SNN Benchmark
        working-directory: packages/snn-webgpu
        run: pnpm benchmark:automate:ci

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: snn-webgpu-benchmark-logs-${{ github.sha }}
          path: packages/snn-webgpu/.bench-logs/
          retention-days: 90
