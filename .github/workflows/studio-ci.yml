name: HoloScript Studio CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/studio/**'
      - 'packages/studio-bridge/**'
      - 'packages/std/**'
      - 'packages/core/**'
      - 'packages/visual/**'
      - 'services/studio-api/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/studio/**'
      - 'packages/studio-bridge/**'
      - 'packages/std/**'
      - 'packages/core/**'
      - 'packages/visual/**'
      - 'services/studio-api/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Type check + Lint ───────────────────────────────────────────────────────
  typecheck:
    name: TypeScript & ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build studio's type dependencies (provides dist/*.d.ts for tsc to resolve subpath imports like @holoscript/engine/orbital, @holoscript/framework/learning, @holoscript/mesh)
        run: |
          pnpm --filter @holoscript/core build
          pnpm --filter @holoscript/engine build
          pnpm --filter @holoscript/framework build
          pnpm --filter @holoscript/mesh build
          pnpm --filter @holoscript/r3f-renderer build

      - name: Type check (core)
        run: pnpm --filter @holoscript/core exec tsc --noEmit

      - name: Type check (studio)
        run: pnpm --filter @holoscript/studio exec tsc --noEmit

      - name: Connector dependency guard (studio docker parity)
        run: pnpm --filter @holoscript/studio test -- src/__tests__/studio-docker-connectors.test.ts

      - name: Node graph execution bridge
        run: pnpm --filter @holoscript/studio exec vitest run src/__tests__/node-graph/NodeGraphPanel.execution.test.ts

      - name: Lint (studio)
        run: pnpm --filter @holoscript/studio exec next lint --max-warnings 0
        continue-on-error: true # lint warnings are advisory

  # ─── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run core tests
        run: pnpm --filter @holoscript/core test --reporter=verbose --passWithNoTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: core-test-results
          path: packages/core/test-results/
          retention-days: 7

  # ─── E2E tests ───────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [typecheck]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @holoscript/studio exec playwright install --with-deps chromium

      - name: Build studio
        run: pnpm --filter @holoscript/studio build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Playwright tests
        run: pnpm --filter @holoscript/studio exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: packages/studio/playwright-report/
          retention-days: 14

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-junit
          path: packages/studio/playwright-results.xml
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-screenshots
          path: packages/studio/test-results/
          retention-days: 7

  # ─── Performance Gates ────────────────────────────────────────────────────────
  performance-gates:
    name: Performance Budget Gates
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmark harness tests
        run: pnpm --filter @holoscript/studio exec vitest run src/lib/__tests__/benchmark-harness.test.ts --reporter=verbose --reporter=json --outputFile=packages/studio/benchmark-results.json
        env:
          CI: true

      - name: Save benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: packages/studio/benchmark-results.json
          retention-days: 30

      - name: Comment performance results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            let body = '## Performance Budget Report\n\n';
            try {
              const raw = fs.readFileSync('packages/studio/benchmark-results.json', 'utf8');
              const results = JSON.parse(raw);
              const passed = results.numPassedTests || 0;
              const failed = results.numFailedTests || 0;
              const total = passed + failed;
              const icon = failed === 0 ? '✅' : '❌';

              body += `${icon} **${passed}/${total}** benchmark tests passed\n\n`;
              body += '| Budget | Threshold | Status |\n';
              body += '|--------|-----------|--------|\n';
              body += `| Parse P95 | 30ms | ${failed === 0 ? '✅ Pass' : '⚠️ Check logs'} |\n`;
              body += `| Compile P95 | 300ms | ${failed === 0 ? '✅ Pass' : '⚠️ Check logs'} |\n`;

              if (results.testResults) {
                body += '\n<details><summary>Test Details</summary>\n\n';
                for (const suite of results.testResults) {
                  for (const test of (suite.assertionResults || [])) {
                    const status = test.status === 'passed' ? '✅' : '❌';
                    body += `- ${status} ${test.ancestorTitles?.join(' > ')} > ${test.title}\n`;
                  }
                }
                body += '\n</details>\n';
              }
            } catch (e) {
              body += '⚠️ Could not parse benchmark results. Check CI logs for details.\n';
            }

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Performance Budget Report';
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── Build check ─────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @holoscript/core build

      - name: Build studio
        id: studio-build
        run: |
          pnpm --filter @holoscript/studio build 2>&1 | tee packages/studio/build-output.txt
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Extract bundle size
        id: bundle-size
        run: |
          echo "=== Studio Bundle Size ==="

          # Extract First Load JS size from next build output
          FIRST_LOAD=$(grep -oP 'First Load JS.*?(\d+\.?\d*)\s*(kB|MB)' packages/studio/build-output.txt | head -1 || echo "")
          echo "first_load_line=$FIRST_LOAD" >> "$GITHUB_OUTPUT"

          # Calculate total .next size
          NEXT_SIZE=$(du -sb packages/studio/.next/ 2>/dev/null | cut -f1 || echo "0")
          NEXT_SIZE_KB=$((NEXT_SIZE / 1024))
          echo "next_size_kb=$NEXT_SIZE_KB" >> "$GITHUB_OUTPUT"
          echo "Total .next size: ${NEXT_SIZE_KB}KB"

          # Extract page sizes from build output
          grep -E '^\s*(┌|├|└|│|λ|○|●|ƒ)\s' packages/studio/build-output.txt > packages/studio/page-sizes.txt 2>/dev/null || true

          # Budget enforcement: 2MB first-load JS budget
          FIRST_LOAD_KB=$(grep -oP '(\d+\.?\d*)\s*kB' packages/studio/build-output.txt | head -1 | grep -oP '\d+\.?\d*' || echo "0")
          FIRST_LOAD_MB=$(echo "$FIRST_LOAD_KB" | awk '{printf "%.2f", $1/1024}')
          echo "first_load_kb=$FIRST_LOAD_KB" >> "$GITHUB_OUTPUT"

          BUDGET_MB=2
          BUDGET_KB=2048
          if [ "$(echo "$FIRST_LOAD_KB > $BUDGET_KB" | bc 2>/dev/null || echo 0)" = "1" ]; then
            echo "budget_exceeded=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Bundle size ${FIRST_LOAD_KB}kB exceeds ${BUDGET_KB}kB budget!"
          else
            echo "budget_exceeded=false" >> "$GITHUB_OUTPUT"
            echo "Bundle size ${FIRST_LOAD_KB}kB is within ${BUDGET_KB}kB budget"
          fi

      - name: Save bundle size report
        if: always()
        run: |
          cat > packages/studio/bundle-size.json << 'SCRIPT'
          {
            "nextSizeKB": ${{ steps.bundle-size.outputs.next_size_kb || 0 }},
            "firstLoadKB": "${{ steps.bundle-size.outputs.first_load_kb || '0' }}",
            "budgetKB": 2048,
            "exceeded": ${{ steps.bundle-size.outputs.budget_exceeded || false }},
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}"
          }
          SCRIPT

      - name: Upload bundle size artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bundle-size
          path: |
            packages/studio/bundle-size.json
            packages/studio/build-output.txt
          retention-days: 30

      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            let body = '## Bundle Size Report\n\n';
            try {
              const raw = fs.readFileSync('packages/studio/bundle-size.json', 'utf8');
              const data = JSON.parse(raw);
              const icon = data.exceeded ? '❌' : '✅';
              const firstLoadMB = (parseFloat(data.firstLoadKB) / 1024).toFixed(2);
              const budgetMB = (data.budgetKB / 1024).toFixed(1);

              body += `${icon} **First Load JS**: ${data.firstLoadKB}kB (${firstLoadMB}MB) — Budget: ${budgetMB}MB\n\n`;
              body += `| Metric | Value |\n`;
              body += `|--------|-------|\n`;
              body += `| First Load JS | ${data.firstLoadKB}kB |\n`;
              body += `| Total .next/ | ${data.nextSizeKB}kB |\n`;
              body += `| Budget | ${data.budgetKB}kB |\n`;
              body += `| Status | ${data.exceeded ? '❌ Over budget' : '✅ Within budget'} |\n`;

              // Try to include page breakdown
              try {
                const pages = fs.readFileSync('packages/studio/page-sizes.txt', 'utf8').trim();
                if (pages) {
                  body += '\n<details><summary>Page Breakdown</summary>\n\n```\n' + pages + '\n```\n\n</details>\n';
                }
              } catch {}
            } catch (e) {
              body += '⚠️ Could not parse bundle size data. Check CI logs.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Bundle Size Report';
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
