name: RFC Implementation Checklist
description: Track phased implementation work for an approved RFC
title: '[RFC Impl]: '
labels: ['enhancement', 'rfc', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Use this template to track implementation status for an RFC across Phase 1/2/3.

  - type: input
    id: rfc_link
    attributes:
      label: RFC Link
      description: Link to the RFC markdown file in proposals/
      placeholder: 'proposals/DAO_Governance_v1.md'
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Implementation Scope
      description: Summarize what will be implemented in this issue
      placeholder: Trait specs, compiler profile, runtime bridge, and reference example
    validations:
      required: true

  - type: checkboxes
    id: phase1
    attributes:
      label: Phase 1 - Spec and Docs
      options:
        - label: Define/confirm trait interfaces and property schema
        - label: Add or update docs and reference pages
        - label: Add parser/LSP recognition as needed
        - label: Add baseline validation rules and diagnostics

  - type: checkboxes
    id: phase2
    attributes:
      label: Phase 2 - Compiler and Runtime
      options:
        - label: Implement compiler target/profile changes
        - label: Implement runtime integration hooks/events
        - label: Add security or safety checks (if applicable)
        - label: Add migration notes for existing users

  - type: checkboxes
    id: phase3
    attributes:
      label: Phase 3 - Example and Verification
      options:
        - label: Add end-to-end example composition(s)
        - label: Add test coverage for core flows
        - label: Validate output on at least one primary target
        - label: Document known limitations and follow-up tasks

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define objective completion criteria for this RFC implementation
      placeholder: All phase boxes checked, tests green, docs linked from index
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and Blockers
      description: List upstream dependencies, blockers, or related issues/PRs

  - type: checkboxes
    id: final_checks
    attributes:
      label: Final Checks
      options:
        - label: I ran build and relevant tests for changed areas
        - label: I updated docs/navigation for new user-facing behavior
        - label: I linked this issue in related PR(s)
