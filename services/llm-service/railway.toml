# Brittney Cloud Service — Railway Deployment Config
# Lightweight API gateway proxying to GPU inference (Fireworks/Together)

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "node dist/server.js"

[service]
internalPort = 8000
