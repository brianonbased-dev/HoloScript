[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/Dockerfile.absorb-service"
watchPatterns = ["services/absorb-service/**", "packages/core/**", "packages/absorb-service/**"]

[deploy]
startCommand = "sh /app/services/absorb-service/scripts/docker-entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "3005"
