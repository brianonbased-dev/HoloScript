# Kubernetes Deployment and Scaling Manifests for HoloScript Core Microservices
# Services: absorb-service, studio-api, export-api

apiVersion: v1
kind: Namespace
metadata:
  name: holoscript-prod
---
# ==========================================
# 1. Absorb Service (Port 3005)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: absorb-service
  namespace: holoscript-prod
  labels:
    app: absorb-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: absorb-service
  template:
    metadata:
      labels:
        app: absorb-service
    spec:
      containers:
      - name: absorb-service
        image: brianonbased/absorb-service:v6.0.0
        ports:
        - containerPort: 3005
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: absorb-service
  namespace: holoscript-prod
spec:
  selector:
    app: absorb-service
  ports:
  - port: 80
    targetPort: 3005
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: absorb-service-hpa
  namespace: holoscript-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: absorb-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# ==========================================
# 2. Studio API Gateway (Port 3000)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-api
  namespace: holoscript-prod
  labels:
    app: studio-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: studio-api
  template:
    metadata:
      labels:
        app: studio-api
    spec:
      containers:
      - name: studio-api
        image: brianonbased/studio-api:v6.0.0
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/connectors/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: studio-api
  namespace: holoscript-prod
spec:
  selector:
    app: studio-api
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: studio-api-hpa
  namespace: holoscript-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: studio-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

---
# ==========================================
# 3. Export API (Port 4000)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-api
  namespace: holoscript-prod
  labels:
    app: export-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: export-api
  template:
    metadata:
      labels:
        app: export-api
    spec:
      containers:
      - name: export-api
        image: brianonbased/export-api:v6.0.0
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 8Gi # Heavy rendering tasks require significant memory
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: export-api
  namespace: holoscript-prod
spec:
  selector:
    app: export-api
  ports:
  - port: 80
    targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: export-api-hpa
  namespace: holoscript-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: export-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
