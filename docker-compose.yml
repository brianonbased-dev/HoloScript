# HoloScript Studio Local Development Stack
# Usage: docker compose up (or: pnpm dev:all for non-Docker local dev)
#
# Services:
#   studio     - Frontend (port 3100) — scene editor, node graph, 3D viewport
#   mcp-server - HoloScript MCP tools (port 3101) — compilation, generation, parsing
#   postgres   - Database (port 5432) — session storage, projects, assets
#
# Secrets: copy .env.example to .env.local and set HOLOSCRIPT_API_KEY + HOLOMESH_API_KEY
# Local MCP: studio talks to the mcp-server container via HOLOSCRIPT_MCP_URL

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holoscript_studio
      POSTGRES_USER: holoscript
      POSTGRES_PASSWORD: holoscript_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U holoscript']
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.mcp-server
    ports:
      - '3101:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOLOSCRIPT_CACHE_DIR=/app/.holoscript
      # Same DB as Studio — MCP token persistence (auth) when running the full stack
      - DATABASE_URL=postgresql://holoscript:holoscript_dev@postgres:5432/holoscript_studio
      - DATABASE_SSL=false
    env_file:
      - path: .env.local
        required: false
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:3000/health\",(r)=>process.exit(r.statusCode===200?0:1))"']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  studio:
    build:
      context: .
      dockerfile: packages/studio/Dockerfile
    ports:
      - '3100:3000'
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3100/api
      - NEXT_PUBLIC_STUDIO_URL=http://localhost:3100
      - HOLOSCRIPT_MCP_URL=http://mcp-server:3000
      - DATABASE_URL=postgresql://holoscript:holoscript_dev@postgres:5432/holoscript_studio
    env_file:
      - path: .env.local
        required: false

volumes:
  pgdata:
