version: '3.8'

# HoloScript Studio Local Development Stack
# Usage: docker compose up (or: pnpm dev:all for non-Docker local dev)
#
# Services:
#   studio     - Frontend (port 3100) — scene editor, node graph, 3D viewport
#   studio-api - Backend API (port 3105) — 70 REST routes, auth, MCP proxy
#   academy    - Tutorial app (port 3102) — Learn/Play modes
#   postgres   - Database (port 5432) — session storage, projects, assets

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holoscript_studio
      POSTGRES_USER: holoscript
      POSTGRES_PASSWORD: holoscript_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U holoscript']
      interval: 5s
      timeout: 3s
      retries: 5

  studio-api:
    build:
      context: .
      dockerfile: services/studio-api/Dockerfile
    ports:
      - '3105:3105'
    environment:
      - DATABASE_URL=postgresql://holoscript:holoscript_dev@postgres:5432/holoscript_studio
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3105
      - MCP_ORCHESTRATOR_URL=${MCP_ORCHESTRATOR_URL:-https://mcp-orchestrator-production-45f9.up.railway.app}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  studio:
    build:
      context: .
      dockerfile: packages/studio/Dockerfile
    ports:
      - '3100:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://studio-api:3105
      - NEXT_PUBLIC_STUDIO_URL=http://localhost:3100
      - NEXT_PUBLIC_ACADEMY_URL=http://localhost:3102
    depends_on:
      - studio-api

volumes:
  pgdata:
