<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloScript WebXR - Simple Cube</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module">
    // HoloScript WebXR Export
    // Generated from: simple-cube.holo
    // Compiler: HoloScript v3.4.0
    // Target: WebXR
    // Timestamp: 2026-02-16T18:00:00Z

    import * as THREE from 'https://cdn.skypack.dev/three@0.157.0';
    import { VRButton } from 'https://cdn.skypack.dev/three@0.157.0/examples/jsm/webxr/VRButton.js';

    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // HoloScript Object: cube
    const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
    const cubeMaterial = new THREE.MeshStandardMaterial({
      color: 0xff0000 // @color(red)
    });
    const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);

    // @position(0, 1, 0)
    cube.position.set(0, 1, 0);

    // @grabbable - WebXR interaction
    cube.userData.grabbable = true;
    cube.userData.holoscript = {
      traits: ['@color(red)', '@position(0, 1, 0)', '@grabbable']
    };

    scene.add(cube);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(ambientLight);
    scene.add(directionalLight);

    // Camera position
    camera.position.set(0, 1.6, 3);
    camera.lookAt(cube.position);

    // VR Controllers (for @grabbable)
    const controller1 = renderer.xr.getController(0);
    const controller2 = renderer.xr.getController(1);
    scene.add(controller1);
    scene.add(controller2);

    // Grab interaction
    let grabbed = null;
    controller1.addEventListener('selectstart', onSelectStart);
    controller1.addEventListener('selectend', onSelectEnd);
    controller2.addEventListener('selectstart', onSelectStart);
    controller2.addEventListener('selectend', onSelectEnd);

    function onSelectStart(event) {
      const controller = event.target;
      const intersections = getIntersections(controller);

      if (intersections.length > 0) {
        const obj = intersections[0].object;
        if (obj.userData.grabbable) {
          grabbed = obj;
          controller.attach(grabbed);
        }
      }
    }

    function onSelectEnd(event) {
      if (grabbed) {
        scene.attach(grabbed);
        grabbed = null;
      }
    }

    function getIntersections(controller) {
      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
      return raycaster.intersectObjects(scene.children, true);
    }

    // Animation loop
    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render() {
      renderer.render(scene, camera);
    }

    // Window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
